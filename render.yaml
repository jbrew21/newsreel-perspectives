services:
  # Web server
  - type: web
    name: newsreel-perspectives
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python serve.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
      - key: RENDER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"

  # Daily pipeline cron -- runs collection + stories at 6am ET
  - type: cron
    name: perspectives-daily-pipeline
    runtime: python
    schedule: "0 11 * * *"  # 11:00 UTC = 6:00 AM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/pipeline.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
