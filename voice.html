<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perspectives -- Voice Profile</title>
<meta name="description" content="See how this voice weighs in across today's biggest stories, and who they align with most.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  /* ================================================================
     DESIGN TOKENS
     8px grid. Intentional gray ramp (Linear/Vercel style).
     Matches search.html / story.html token system exactly.
     ================================================================ */
  :root {
    /* Surface ramp -- each step is intentional */
    --bg-base: #09090b;
    --bg-subtle: #0f0f12;
    --bg-card: #141417;
    --bg-elevated: #1a1a1f;
    --bg-hover: #222228;
    --bg-active: #2a2a32;

    /* Text ramp */
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --text-dim: #52525b;

    /* Borders */
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --border-focus: rgba(255,99,67,0.5);

    /* Accent */
    --accent: #FF6343;
    --accent-hover: #e5553a;
    --accent-bg: rgba(255,99,67,0.10);
    --accent-bg-hover: rgba(255,99,67,0.16);

    /* Spacing (8px grid) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 32px;
    --space-8: 40px;
    --space-9: 48px;
    --space-10: 64px;

    /* Typography scale */
    --text-xs: 11px;
    --text-sm: 13px;
    --text-base: 15px;
    --text-lg: 17px;
    --text-xl: 20px;
    --text-2xl: 28px;
    --text-3xl: 36px;

    /* Line heights */
    --leading-tight: 1.2;
    --leading-snug: 1.35;
    --leading-normal: 1.5;
    --leading-relaxed: 1.6;

    /* Radius */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 100px;

    /* Transitions */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --duration-fast: 150ms;
    --duration-normal: 200ms;
    --duration-slow: 300ms;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* -- SKIP LINK -- */
  .skip-link {
    position: absolute; top: -100%; left: var(--space-4); z-index: 100;
    background: var(--accent); color: #fff;
    padding: var(--space-3) var(--space-6);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    font-weight: 600; font-size: var(--text-sm);
    text-decoration: none; transition: top var(--duration-normal);
  }
  .skip-link:focus { top: 0; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-base); color: var(--text-secondary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  :focus:not(:focus-visible) { outline: none; }

  /* -- NAV -- */
  .nav {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-5) var(--space-5) 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-brand {
    display: flex; align-items: baseline; gap: 0; text-decoration: none;
    transition: opacity var(--duration-fast);
  }
  .nav-brand:hover { opacity: 0.85; }
  .nav-brand:active { opacity: 0.7; }
  .nav-brand img { height: 22px; }
  .nav-brand-label {
    font-size: var(--text-xs); font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .nav-back {
    font-size: var(--text-sm); font-weight: 600; color: var(--text-muted);
    text-decoration: none; display: inline-flex; align-items: center; gap: var(--space-1);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-sm);
    transition: color var(--duration-fast), background var(--duration-fast);
  }
  .nav-back:hover { color: var(--text-primary); background: var(--bg-elevated); }
  .nav-back:active { background: var(--bg-hover); }

  /* -- PROFILE HEADER -- */
  .profile-header {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-7) var(--space-5) 0;
    text-align: center;
  }
  .profile-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--bg-elevated);
    margin-bottom: var(--space-4); background: var(--bg-elevated);
  }
  .profile-name {
    font-size: var(--text-2xl); font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.02em; margin-bottom: var(--space-1);
    line-height: var(--leading-tight);
  }
  .profile-lens {
    font-size: var(--text-base); color: var(--text-muted);
    line-height: var(--leading-relaxed);
    max-width: 500px; margin: 0 auto var(--space-4);
  }

  /* -- TAGS -- */
  .profile-tags {
    display: flex; flex-wrap: wrap; gap: var(--space-2);
    justify-content: center; margin-bottom: var(--space-4);
  }
  .profile-tag {
    font-size: var(--text-xs); font-weight: 600;
    padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
    background: var(--accent-bg); color: var(--accent);
    border: 1px solid rgba(255,99,67,0.15);
  }

  /* -- PLATFORM PILLS -- */
  .profile-platforms {
    display: flex; flex-wrap: wrap; gap: var(--space-2);
    justify-content: center; margin-bottom: var(--space-4);
  }
  .platform-pill {
    font-size: var(--text-xs); font-weight: 600;
    padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-muted); text-decoration: none;
    transition: all var(--duration-normal) var(--ease-out);
  }
  .platform-pill:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
  .platform-pill:active { transform: scale(0.97); }

  /* -- SECTION DIVIDERS -- */
  .section-divider {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-6) var(--space-5) 0;
  }
  .section-divider-inner {
    display: flex; align-items: center; gap: var(--space-2);
    padding-bottom: var(--space-3);
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: var(--text-xs); font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .section-count {
    font-size: var(--text-xs); color: var(--text-dim);
  }

  /* -- POSITION CARDS -- */
  .positions-list {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-4) var(--space-5) var(--space-8);
  }
  .position-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: var(--space-4);
    margin-bottom: var(--space-3);
    transition: border-color var(--duration-normal) var(--ease-out);
  }
  .position-card:hover { border-color: var(--border-hover); }
  .position-top-row {
    display: flex; align-items: center; gap: var(--space-2);
    margin-bottom: var(--space-3); flex-wrap: wrap;
  }
  .position-topic {
    font-size: var(--text-xs); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .position-cluster {
    display: inline-flex; padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600;
  }
  .position-quote {
    font-size: var(--text-sm); color: var(--text-secondary);
    line-height: var(--leading-normal); font-style: italic;
    margin-bottom: var(--space-3); padding-left: var(--space-3);
    border-left: 2px solid var(--bg-hover);
  }
  .position-meta {
    font-size: var(--text-xs); color: var(--text-dim);
    display: flex; align-items: center; gap: var(--space-2);
    flex-wrap: wrap;
  }
  .position-meta-link {
    color: var(--accent); text-decoration: none;
    display: inline-flex; align-items: center; gap: var(--space-1);
    transition: opacity var(--duration-fast);
  }
  .position-meta-link:hover { text-decoration: underline; opacity: 0.85; }

  /* -- CLUSTER CONTEXT (inline within position card) -- */
  .cluster-context {
    margin-top: var(--space-3); padding: var(--space-3) var(--space-3);
    background: var(--bg-elevated); border-radius: var(--radius-md);
  }
  .cluster-context-label {
    font-size: var(--text-xs); color: var(--text-dim);
    margin-bottom: var(--space-2);
  }
  .cluster-context-row {
    display: flex; align-items: center;
  }
  .cluster-context-avatars {
    display: flex; align-items: center;
  }
  .cluster-context-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--bg-elevated);
    margin-left: -6px; background: var(--bg-hover);
  }
  .cluster-context-avatar:first-child { margin-left: 0; }
  .cluster-context-names {
    font-size: var(--text-xs); color: var(--text-muted);
    margin-left: var(--space-2);
  }

  /* -- ALIGNED VOICES -- */
  .allies-list {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-4) var(--space-5) var(--space-8);
  }
  .ally-row {
    display: flex; align-items: center; gap: var(--space-3);
    padding: var(--space-3) var(--space-3);
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-md); margin-bottom: var(--space-2);
    transition: border-color var(--duration-normal) var(--ease-out), background var(--duration-fast);
    text-decoration: none; color: inherit;
  }
  .ally-row:last-child { margin-bottom: 0; }
  .ally-row:hover { border-color: var(--border-hover); background: var(--bg-elevated); }
  .ally-row:active { background: var(--bg-hover); }
  .ally-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    object-fit: cover; background: var(--bg-hover); flex-shrink: 0;
  }
  .ally-info { flex: 1; min-width: 0; }
  .ally-name {
    font-size: var(--text-sm); font-weight: 600; color: var(--text-primary);
    line-height: var(--leading-snug);
  }
  .ally-detail {
    font-size: var(--text-xs); color: var(--text-muted);
    line-height: var(--leading-snug);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ally-badge {
    font-size: var(--text-xs); font-weight: 600;
    padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-sm); flex-shrink: 0;
  }
  .ally-badge-aligned {
    background: rgba(74,222,128,0.12); color: #4ADE80;
  }

  /* -- EMPTY STATE -- */
  .empty-state {
    text-align: center; padding: var(--space-8) var(--space-5);
    color: var(--text-dim); font-size: var(--text-sm);
  }

  /* -- ERROR / NOT-FOUND STATES -- */
  .state-message {
    text-align: center;
    padding: var(--space-10) var(--space-5);
    max-width: 400px; margin: 0 auto;
  }
  .state-message-icon {
    margin-bottom: var(--space-4);
    color: var(--text-dim); line-height: 1;
  }
  .state-message-title {
    font-size: var(--text-lg); font-weight: 600;
    color: var(--text-primary); margin-bottom: var(--space-2);
  }
  .state-message-body {
    font-size: var(--text-sm); color: var(--text-muted);
    line-height: var(--leading-relaxed); margin-bottom: var(--space-5);
  }
  .state-message-actions {
    display: flex; flex-direction: column; align-items: center; gap: var(--space-2);
  }
  .state-action {
    display: inline-flex; align-items: center; gap: var(--space-2);
    padding: var(--space-3) var(--space-5);
    font-size: var(--text-sm); font-weight: 600;
    border-radius: var(--radius-md); text-decoration: none;
    font-family: inherit; cursor: pointer;
    transition: all var(--duration-normal) var(--ease-out);
  }
  .state-action-primary {
    background: var(--accent); color: #fff; border: none;
  }
  .state-action-primary:hover { background: var(--accent-hover); }
  .state-action-primary:active { transform: scale(0.97); }
  .state-action-secondary {
    background: var(--bg-card); color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .state-action-secondary:hover {
    border-color: var(--border-hover); color: var(--text-primary);
    background: var(--bg-elevated);
  }
  .state-action-secondary:active { transform: scale(0.97); }

  /* -- SKELETON LOADING -- */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 37%, var(--bg-elevated) 63%);
    background-size: 800px 100%;
    animation: shimmer 1.8s ease-in-out infinite;
    border-radius: var(--radius-sm);
  }
  .skeleton-profile {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-7) var(--space-5) 0;
    display: flex; flex-direction: column; align-items: center;
  }
  .skeleton-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    margin-bottom: var(--space-4);
  }
  .skeleton-line { height: 14px; margin-bottom: var(--space-3); }
  .skeleton-line.h-lg { height: 24px; }
  .skeleton-line.h-xl { height: 32px; }
  .skeleton-line.w-full { width: 100%; }
  .skeleton-line.w-3-4 { width: 75%; }
  .skeleton-line.w-1-2 { width: 50%; }
  .skeleton-line.w-1-3 { width: 33%; }
  .skeleton-line.w-1-4 { width: 25%; }
  .skeleton-pills {
    display: flex; gap: var(--space-2); justify-content: center;
    margin-bottom: var(--space-4);
  }
  .skeleton-pill {
    height: 26px; width: 60px; border-radius: var(--radius-full);
  }
  .skeleton-divider {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-6) var(--space-5) 0;
  }
  .skeleton-divider-inner {
    height: 1px; width: 100%; background: var(--border);
    margin-bottom: var(--space-3);
  }
  .skeleton-cards {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-4) var(--space-5);
  }
  .skeleton-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5);
    margin-bottom: var(--space-3);
  }

  /* -- FOOTER -- */
  .site-footer {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-8) var(--space-5) var(--space-7);
    border-top: 1px solid var(--border); text-align: center;
  }
  .footer-brand {
    font-size: var(--text-sm); font-weight: 700;
    color: var(--text-primary); margin-bottom: var(--space-2);
  }
  .footer-brand span { color: var(--accent); }
  .footer-links {
    display: flex; justify-content: center; gap: var(--space-5);
    flex-wrap: wrap; margin-bottom: var(--space-3);
  }
  .footer-links a {
    font-size: var(--text-sm); color: var(--text-muted);
    text-decoration: none;
    transition: color var(--duration-fast);
  }
  .footer-links a:hover { color: var(--text-primary); }
  .footer-copy { font-size: var(--text-xs); color: var(--text-dim); }

  /* -- MOBILE -- */
  @media (max-width: 600px) {
    .nav { padding: var(--space-4) var(--space-4) 0; }
    .nav-brand img { height: 18px; }
    .profile-header { padding: var(--space-6) var(--space-4) 0; }
    .profile-avatar { width: 64px; height: 64px; }
    .profile-name { font-size: var(--text-xl); }
    .profile-lens { font-size: var(--text-sm); max-width: 100%; }
    .profile-platforms { gap: var(--space-1); }
    .platform-pill { font-size: 10px; padding: var(--space-1) var(--space-3); }
    .section-divider { padding: var(--space-4) var(--space-4) 0; }
    .positions-list { padding: var(--space-4) var(--space-4) var(--space-6); }
    .position-card { padding: var(--space-3); }
    .position-quote { font-size: var(--text-sm); padding-left: var(--space-3); }
    .position-topic { font-size: 10px; }
    .position-cluster { font-size: 10px; }
    .cluster-context { padding: var(--space-2) var(--space-3); }
    .cluster-context-names { font-size: 10px; }
    .allies-list { padding: var(--space-4) var(--space-4) var(--space-6); }
    .ally-row { padding: var(--space-2) var(--space-3); gap: var(--space-3); }
    .ally-avatar { width: 32px; height: 32px; }
    .ally-name { font-size: var(--text-sm); }
    .ally-detail { font-size: var(--text-xs); }
    .skeleton-profile { padding: var(--space-6) var(--space-4) 0; }
    .skeleton-avatar { width: 64px; height: 64px; }
    .skeleton-divider { padding: var(--space-4) var(--space-4) 0; }
    .skeleton-cards { padding: var(--space-4) var(--space-4); }
    .site-footer { padding: var(--space-7) var(--space-4) var(--space-6); }
  }
</style>
</head>

<script>
/* ================================================================
   Perspectives Voice Profile -- IIFE to avoid global pollution
   All state and functions scoped inside.
   ================================================================ */
;(function() {
  'use strict';

  /* -- ROUTING -- */
  var BASE = location.pathname.includes('/perspectives') ? '/perspectives' : '';
  var PAGES = {
    home: BASE || '/',
    search: BASE + '/search',
    voices: BASE + '/voices',
    methodology: BASE + '/methodology'
  };

  document.getElementById('homeLink').href = PAGES.home;
  document.getElementById('backLink').href = PAGES.voices;
  document.getElementById('methodLink').href = PAGES.methodology;
  document.getElementById('voicesLink').href = PAGES.voices;

  /* -- CONSTANTS -- */
  var COLORS = ['#60A5FA','#F87171','#FBBF24','#A78BFA','#4ADE80','#22D3EE','#F472B6','#FB923C'];
  var PLATFORM = {
    x: 'X', youtube: 'YouTube', bluesky: 'Bluesky',
    instagram: 'Instagram', tiktok: 'TikTok',
    substack: 'Substack', podcast: 'Podcast'
  };

  /* -- DOM REFS -- */
  var skeletonEl = document.getElementById('skeleton');
  var contentEl = document.getElementById('content');

  /* -- UTILITIES -- */
  function esc(t) {
    var d = document.createElement('div');
    d.textContent = t || '';
    return d.innerHTML;
  }

  function safeHref(url) {
    if (!url || typeof url !== 'string') return '#';
    var trimmed = url.trim();
    if (/^javascript:/i.test(trimmed)) return '#';
    return trimmed;
  }

  function topicColor(topic) {
    var hash = 0;
    for (var i = 0; i < topic.length; i++) {
      hash = topic.charCodeAt(i) + ((hash << 5) - hash);
    }
    return COLORS[Math.abs(hash) % COLORS.length];
  }

  function fullPlatformName(p) {
    return PLATFORM[p] || p || '';
  }

  function timeAgo(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    var now = new Date();
    var days = Math.floor((now - d) / 86400000);
    if (days > 30) return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    if (days > 0) return days + 'd ago';
    var hrs = Math.floor((now - d) / 3600000);
    if (hrs > 0) return hrs + 'h ago';
    return 'just now';
  }

  /* -- STATE MESSAGE BUILDER -- */
  function stateMessage(iconSvg, title, body, actions) {
    var wrap = document.createElement('div');
    wrap.className = 'state-message';
    wrap.setAttribute('role', 'status');

    var html = '';
    if (iconSvg) html += '<div class="state-message-icon">' + iconSvg + '</div>';
    if (title) html += '<div class="state-message-title">' + esc(title) + '</div>';
    if (body) html += '<div class="state-message-body">' + esc(body) + '</div>';
    wrap.innerHTML = html;

    if (actions && actions.length > 0) {
      var actionsWrap = document.createElement('div');
      actionsWrap.className = 'state-message-actions';
      actions.forEach(function(action) {
        var el = document.createElement('a');
        el.className = 'state-action ' + (action.primary ? 'state-action-primary' : 'state-action-secondary');
        el.href = action.href || '#';
        el.textContent = action.text;
        if (action.href === '#' && action.onClick) {
          el.addEventListener('click', function(e) { e.preventDefault(); action.onClick(); });
        }
        actionsWrap.appendChild(el);
      });
      wrap.appendChild(actionsWrap);
    }
    return wrap;
  }

  /* -- DELEGATED IMAGE FALLBACK -- */
  document.addEventListener('error', function(e) {
    var el = e.target;
    if (el.tagName !== 'IMG' || el.dataset.fallbackApplied) return;
    el.dataset.fallbackApplied = 'true';
    var name = el.dataset.fallbackName || el.alt || 'User';
    var size = el.dataset.fallbackSize || '80';
    el.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1a1a1f&color=a1a1aa&size=' + size;
  }, true);

  /* -- PARSE VOICE ID FROM PATH -- */
  function getVoiceIdFromPath() {
    var m = location.pathname.match(/\/voice\/(.+)/);
    if (!m) return null;
    var id = decodeURIComponent(m[1]).replace(/\/$/, '');
    return id || null;
  }

  /* -- ERROR STATES -- */
  function showError(title, msg) {
    skeletonEl.style.display = 'none';
    contentEl.style.display = 'block';
    contentEl.innerHTML = '';
    contentEl.appendChild(
      stateMessage(
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>',
        title,
        msg,
        [{ text: 'Browse all voices', href: PAGES.voices, primary: false }]
      )
    );
  }

  /* -- LOAD PROFILE -- */
  function loadProfile() {
    var voiceId = getVoiceIdFromPath();

    if (!voiceId) {
      showError('No voice specified', 'The URL is missing a voice identifier.');
      return;
    }

    var voices = [];
    var voice = null;

    // Load voice metadata
    fetch(BASE + '/data/voices.json')
      .then(function(resp) {
        if (!resp.ok) throw new Error('Voice data unavailable');
        return resp.json();
      })
      .then(function(data) {
        voices = data || [];
        voice = null;
        for (var i = 0; i < voices.length; i++) {
          if (voices[i].id === voiceId) { voice = voices[i]; break; }
        }

        if (!voice) {
          showError('Voice not found', '"' + voiceId + '" is not in our database.');
          return;
        }

        document.title = voice.name + ' -- Perspectives';

        // Load posts (try today, yesterday, day before)
        var now = new Date();
        var dates = [
          now.toISOString().split('T')[0],
          new Date(now - 86400000).toISOString().split('T')[0],
          new Date(now - 172800000).toISOString().split('T')[0]
        ];

        return tryLoadPosts(dates, 0).then(function(postData) {
          return loadStories().then(function(storyItems) {
            renderProfile(voice, voices, postData, storyItems);
          });
        });
      })
      .catch(function(err) {
        console.error('[Perspectives] Profile load failed:', err);
        showError('Failed to load', 'Something went wrong. Please try again.');
      });
  }

  function tryLoadPosts(dates, idx) {
    if (idx >= dates.length) return Promise.resolve(null);
    var voiceId = getVoiceIdFromPath();
    return fetch(BASE + '/data/posts/' + voiceId + '/' + dates[idx] + '.json')
      .then(function(resp) {
        if (resp.ok) return resp.json();
        return tryLoadPosts(dates, idx + 1);
      })
      .catch(function() {
        return tryLoadPosts(dates, idx + 1);
      });
  }

  function loadStories() {
    return fetch(BASE + '/api/stories')
      .then(function(resp) {
        if (!resp.ok) throw new Error('Stories unavailable');
        return resp.json();
      })
      .then(function(data) {
        if (data && data.length > 0) return data;
        return fetch(BASE + '/api/fractures')
          .then(function(r) { return r.json(); })
          .catch(function() { return []; });
      })
      .catch(function() { return []; });
  }

  /* -- RENDER PROFILE -- */
  function renderProfile(voice, voices, postData, storyItems) {
    var voiceId = voice.id;

    // Build photo lookup
    var voicePhotoMap = {};
    for (var i = 0; i < voices.length; i++) {
      voicePhotoMap[voices[i].id] = voices[i].photo;
    }

    // Normalize stories
    var normalizedStories = (storyItems || []).map(function(s) {
      return {
        topicDisplay: s.headline || s.topicDisplay || '',
        topicSlug: (s.topicSlugs || [])[0] || s.topic || '',
        clusters: s.clusters || [],
        insight: s.summary || s.insight || ''
      };
    });

    // Find which clusters this voice appears in
    var clusterMap = {};
    for (var fi = 0; fi < normalizedStories.length; fi++) {
      var f = normalizedStories[fi];
      for (var ci = 0; ci < f.clusters.length; ci++) {
        var cluster = f.clusters[ci];
        var inCluster = null;
        for (var vi = 0; vi < cluster.voices.length; vi++) {
          if (cluster.voices[vi].voiceId === voiceId) { inCluster = cluster.voices[vi]; break; }
        }
        if (inCluster) {
          var allies = [];
          for (var ai = 0; ai < cluster.voices.length; ai++) {
            var a = cluster.voices[ai];
            if (a.voiceId !== voiceId) {
              allies.push({
                voiceId: a.voiceId,
                voiceName: a.voiceName,
                photo: voicePhotoMap[a.voiceId] || a.photo,
                platform: a.platform,
                quote: a.quote,
                sourceUrl: a.sourceUrl
              });
            }
          }
          clusterMap[f.topicSlug] = {
            storyHeadline: f.topicDisplay,
            clusterName: cluster.name,
            allies: allies
          };
          break;
        }
      }
    }

    // Extract post data
    var posts = (postData && postData.posts) ? postData.posts : [];
    var topicSummary = (postData && postData.topicSummary) ? postData.topicSummary : {};
    var topics = [];
    for (var tk in topicSummary) {
      if (topicSummary.hasOwnProperty(tk) && tk !== 'uncategorized' && topicSummary[tk] && topicSummary[tk].length > 0) {
        topics.push(tk);
      }
    }

    // Photo URL
    var photoUrl = voice.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(voice.name) + '&background=1a1a1f&color=a1a1aa&size=160';

    // Platform links
    var h = voice.handles || {};
    var feeds = voice.feeds || {};
    var platformLinksHtml = '';
    var platformEntries = [];

    if (h.x) platformEntries.push({ label: 'X', href: 'https://x.com/' + h.x });
    if (h.youtube) {
      var yt = h.youtube.startsWith('@') ? h.youtube : (h.youtube.indexOf('/') !== -1 ? h.youtube : '@' + h.youtube);
      platformEntries.push({ label: 'YouTube', href: 'https://youtube.com/' + yt });
    }
    if (h.bluesky) platformEntries.push({ label: 'Bluesky', href: 'https://bsky.app/profile/' + h.bluesky });
    if (h.tiktok) platformEntries.push({ label: 'TikTok', href: 'https://tiktok.com/@' + h.tiktok });
    if (h.instagram) platformEntries.push({ label: 'Instagram', href: 'https://instagram.com/' + h.instagram });
    if (feeds.substack) platformEntries.push({ label: 'Substack', href: feeds.substack.replace(/\/feed\/?$/, '') });
    if (feeds.podcast) platformEntries.push({ label: 'Podcast', href: null });

    if (platformEntries.length > 0) {
      var pills = platformEntries.map(function(entry) {
        if (entry.href) {
          return '<a class="platform-pill" href="' + safeHref(entry.href) + '" target="_blank" rel="noopener">' + esc(entry.label) + '</a>';
        }
        return '<span class="platform-pill">' + esc(entry.label) + '</span>';
      }).join('');
      platformLinksHtml = '<div class="profile-platforms">' + pills + '</div>';
    }

    // Tags
    var tagsHtml = '';
    if (voice.tags && voice.tags.length > 0) {
      var tagSpans = voice.tags.map(function(t) {
        return '<span class="profile-tag">' + esc(t) + '</span>';
      }).join('');
      tagsHtml = '<div class="profile-tags">' + tagSpans + '</div>';
    }

    // Sort topics: those with cluster context first, then by quote count
    topics.sort(function(a, b) {
      var aHas = clusterMap[a] ? 1 : 0;
      var bHas = clusterMap[b] ? 1 : 0;
      if (aHas !== bHas) return bHas - aHas;
      return (topicSummary[b] || []).length - (topicSummary[a] || []).length;
    });

    // Build position cards
    var positionsHtml = '';
    for (var ti = 0; ti < topics.length; ti++) {
      var topic = topics[ti];
      var quotes = topicSummary[topic] || [];
      if (quotes.length === 0) continue;

      var bestQuote = quotes[0];
      var color = topicColor(topic);
      var clusterInfo = clusterMap[topic];

      // Cluster badge
      var clusterBadge = '';
      if (clusterInfo) {
        clusterBadge = '<span class="position-cluster" style="background:' + color + '15;color:' + color + ';">' + esc(clusterInfo.clusterName) + '</span>';
      }

      // Source link
      var platformName = fullPlatformName(bestQuote.platform);
      var time = timeAgo(bestQuote.timestamp);
      var sourceLink = '';
      if (bestQuote.sourceUrl) {
        sourceLink = '<a class="position-meta-link" href="' + safeHref(bestQuote.sourceUrl) + '" target="_blank" rel="noopener">View on ' + esc(platformName) +
          ' <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></a>';
      } else {
        sourceLink = '<span>' + esc(platformName) + '</span>';
      }

      // Cluster allies context
      var alliesContextHtml = '';
      if (clusterInfo && clusterInfo.allies.length > 0) {
        var avatars = '';
        var showCount = Math.min(clusterInfo.allies.length, 5);
        for (var av = 0; av < showCount; av++) {
          var ally = clusterInfo.allies[av];
          var allyPhoto = ally.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(ally.voiceName) + '&background=1a1a1f&color=a1a1aa&size=48';
          avatars += '<a href="' + BASE + '/voice/' + ally.voiceId + '" aria-label="' + esc(ally.voiceName) + '">' +
            '<img class="cluster-context-avatar" src="' + allyPhoto + '" alt="" data-fallback-name="' + esc(ally.voiceName) + '" data-fallback-size="48" loading="lazy">' +
            '</a>';
        }

        var namesList = [];
        for (var ni = 0; ni < Math.min(clusterInfo.allies.length, 3); ni++) {
          namesList.push(clusterInfo.allies[ni].voiceName);
        }
        var namesStr = esc(namesList.join(', '));
        var moreCount = clusterInfo.allies.length - 3;
        if (moreCount > 0) namesStr += ' +' + moreCount + ' more';

        alliesContextHtml = '<div class="cluster-context">' +
          '<div class="cluster-context-label">Others in "' + esc(clusterInfo.clusterName) + '"</div>' +
          '<div class="cluster-context-row">' +
            '<div class="cluster-context-avatars">' + avatars + '</div>' +
            '<div class="cluster-context-names">' + namesStr + '</div>' +
          '</div>' +
        '</div>';
      }

      var quoteText = (bestQuote.quote || bestQuote.text || '').substring(0, 280);

      positionsHtml += '<article class="position-card">' +
        '<div class="position-top-row">' +
          '<span class="position-topic" style="color:' + color + ';">' + esc(topic.replace(/-/g, ' ')) + '</span>' +
          clusterBadge +
        '</div>' +
        (quoteText ? '<blockquote class="position-quote">"' + esc(quoteText) + '"</blockquote>' : '') +
        '<div class="position-meta">' +
          '<span>' + esc(platformName) + '</span>' +
          (time ? '<span>' + esc(time) + '</span>' : '') +
          sourceLink +
        '</div>' +
        alliesContextHtml +
      '</article>';
    }

    if (!positionsHtml) {
      positionsHtml = '<div class="empty-state">No recent positions found. Check back after the next daily collection.</div>';
    }

    // Build aligned voices section
    var allyCount = {};
    var clusterKeys = [];
    for (var ck in clusterMap) {
      if (clusterMap.hasOwnProperty(ck)) clusterKeys.push(ck);
    }
    for (var ki = 0; ki < clusterKeys.length; ki++) {
      var cAllies = clusterMap[clusterKeys[ki]].allies;
      for (var cai = 0; cai < cAllies.length; cai++) {
        var ca = cAllies[cai];
        if (!allyCount[ca.voiceId]) {
          allyCount[ca.voiceId] = {
            voiceId: ca.voiceId,
            voiceName: ca.voiceName,
            photo: ca.photo,
            count: 0,
            topics: []
          };
        }
        allyCount[ca.voiceId].count++;
        allyCount[ca.voiceId].topics.push(clusterKeys[ki].replace(/-/g, ' '));
      }
    }

    var sortedAllies = [];
    for (var sid in allyCount) {
      if (allyCount.hasOwnProperty(sid)) sortedAllies.push(allyCount[sid]);
    }
    sortedAllies.sort(function(a, b) { return b.count - a.count; });

    var totalStories = clusterKeys.length;
    var alignedHtml = '';

    if (sortedAllies.length > 0) {
      var showAllies = sortedAllies.slice(0, 6);
      for (var si = 0; si < showAllies.length; si++) {
        var sa = showAllies[si];
        var saPhoto = sa.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(sa.voiceName) + '&background=1a1a1f&color=a1a1aa&size=72';
        var badge = '';
        if (totalStories > 1) {
          badge = '<div class="ally-badge ally-badge-aligned">' + sa.count + '/' + totalStories + '</div>';
        }
        alignedHtml += '<a class="ally-row" href="' + BASE + '/voice/' + sa.voiceId + '" aria-label="View ' + esc(sa.voiceName) + ' profile">' +
          '<img class="ally-avatar" src="' + saPhoto + '" alt="" data-fallback-name="' + esc(sa.voiceName) + '" data-fallback-size="72" loading="lazy">' +
          '<div class="ally-info">' +
            '<div class="ally-name">' + esc(sa.voiceName) + '</div>' +
            '<div class="ally-detail">' + esc(sa.topics.join(', ')) + '</div>' +
          '</div>' +
          badge +
        '</a>';
      }
    }

    // Assemble final HTML
    var alignedSection = '';
    if (alignedHtml) {
      alignedSection = '<div class="section-divider">' +
        '<div class="section-divider-inner">' +
          '<span class="section-title">Aligned with</span>' +
          '<span class="section-count">based on ' + totalStories + ' stor' + (totalStories !== 1 ? 'ies' : 'y') + '</span>' +
        '</div>' +
      '</div>' +
      '<section class="allies-list" aria-label="Voices aligned with ' + esc(voice.name) + '">' + alignedHtml + '</section>';
    }

    // Hide skeleton, show content
    skeletonEl.style.display = 'none';
    contentEl.style.display = 'block';

    contentEl.innerHTML =
      '<header class="profile-header">' +
        '<img class="profile-avatar" src="' + photoUrl + '" alt="' + esc(voice.name) + '" data-fallback-name="' + esc(voice.name) + '" data-fallback-size="160" loading="lazy">' +
        '<h1 class="profile-name">' + esc(voice.name) + '</h1>' +
        (voice.lens ? '<p class="profile-lens">' + esc(voice.lens) + '</p>' : '') +
        tagsHtml +
        platformLinksHtml +
      '</header>' +
      '<div class="section-divider">' +
        '<div class="section-divider-inner">' +
          '<span class="section-title">Positions</span>' +
          '<span class="section-count">' + topics.length + ' topic' + (topics.length !== 1 ? 's' : '') + ' today</span>' +
        '</div>' +
      '</div>' +
      '<section class="positions-list" aria-label="Positions by ' + esc(voice.name) + '">' + positionsHtml + '</section>' +
      alignedSection;
  }

  /* -- INIT -- */
  loadProfile();

})();
</script>
</body>
</html>
