<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perspectives — Voice Profile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg-base: #0a0a0b;
    --bg-surface: #141416;
    --bg-surface-2: #1c1c1f;
    --bg-elevated: #252528;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-tertiary: #71717a;
    --text-muted: #52525b;
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-default: rgba(255, 255, 255, 0.1);
    --accent: #FF6343;
    --accent-bg: rgba(255, 99, 67, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-base);
    color: var(--text-secondary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  .nav { max-width: 900px; margin: 0 auto; padding: 0 20px; }
  .nav-inner {
    padding: 14px 0; border-bottom: 1px solid var(--border-subtle);
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-brand img { height: 22px; }
  .nav-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .nav-links a { font-family: monospace; font-size: 11px; text-decoration: none; margin-left: 16px; color: var(--text-muted); }
  .nav-links a:hover { color: var(--accent); }

  /* PROFILE HEADER */
  .profile-header {
    text-align: center;
    padding: 32px 20px 24px;
    max-width: 900px; margin: 0 auto;
  }
  .profile-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--bg-elevated);
    margin-bottom: 16px; background: var(--bg-elevated);
  }
  .profile-name {
    font-size: 1.6em; font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.02em; margin-bottom: 4px;
  }
  .profile-lens {
    font-size: 0.9em; color: var(--text-tertiary);
    line-height: 1.5; max-width: 500px; margin: 0 auto 16px;
  }

  /* TAGS */
  .profile-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    justify-content: center; margin-bottom: 16px;
  }
  .profile-tag {
    font-size: 11px; font-weight: 600;
    padding: 4px 12px; border-radius: 100px;
    background: var(--accent-bg); color: var(--accent);
    border: 1px solid rgba(255, 99, 67, 0.15);
  }

  /* PLATFORM PILLS */
  .profile-platforms {
    display: flex; flex-wrap: wrap; gap: 6px;
    justify-content: center; margin-bottom: 16px;
  }
  .platform-pill {
    font-size: 11px; font-weight: 600;
    padding: 5px 14px; border-radius: 100px;
    background: var(--bg-surface); border: 1px solid var(--border-subtle);
    color: var(--text-tertiary); text-decoration: none;
    transition: all 0.2s;
  }
  .platform-pill:hover { color: var(--accent); border-color: var(--accent); }

  /* SECTION HEADERS */
  .section-header {
    max-width: 900px; margin: 0 auto; padding: 0 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 12px; margin-bottom: 0;
  }
  .section-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .section-count {
    font-size: 11px; color: var(--text-muted);
  }

  /* POSITION CARDS — one consistent design */
  .positions-list {
    max-width: 900px; margin: 0 auto; padding: 16px 20px 40px;
  }
  .position-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 14px; padding: 16px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .position-card:hover { border-color: var(--border-default); }

  .position-top-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .position-topic {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .position-cluster {
    display: inline-flex; padding: 2px 10px;
    border-radius: 100px; font-size: 11px; font-weight: 600;
  }
  .position-quote {
    font-size: 14px; color: var(--text-secondary);
    line-height: 1.55; font-style: italic;
    margin-bottom: 10px; padding-left: 12px;
    border-left: 2px solid var(--bg-elevated);
  }
  .position-meta {
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .position-meta a { color: var(--accent); text-decoration: none; }
  .position-meta a:hover { text-decoration: underline; }

  /* CLUSTER CONTEXT (inline, not a separate section) */
  .cluster-context {
    margin-top: 10px; padding: 10px 14px;
    background: var(--bg-surface-2); border-radius: 10px;
  }
  .cluster-context-label {
    font-size: 11px; color: var(--text-muted);
    margin-bottom: 6px;
  }
  .cluster-context-avatars {
    display: flex; align-items: center; gap: 0;
  }
  .cluster-context-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--bg-surface-2);
    margin-left: -6px; background: var(--bg-elevated);
  }
  .cluster-context-avatar:first-child { margin-left: 0; }
  .cluster-context-names {
    font-size: 11px; color: var(--text-tertiary);
    margin-left: 8px;
  }

  /* ALLIES SECTION */
  .allies-section {
    max-width: 900px; margin: 0 auto; padding: 16px 20px 40px;
  }
  .ally-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px; margin-bottom: 8px;
    transition: border-color 0.2s;
    cursor: pointer; text-decoration: none; color: inherit;
  }
  .ally-row:hover { border-color: var(--border-default); }
  .ally-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    object-fit: cover; background: var(--bg-elevated);
  }
  .ally-info { flex: 1; }
  .ally-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .ally-detail { font-size: 12px; color: var(--text-tertiary); }
  .ally-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 6px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text-muted);
    font-size: 13px;
  }

  /* LOADING / NOT FOUND */
  .loading-state {
    text-align: center; padding: 60px 20px; color: var(--text-tertiary);
  }
  .loading-state .spinner {
    width: 20px; height: 20px; border: 2px solid var(--bg-elevated);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .not-found { text-align: center; padding: 80px 20px; }
  .not-found h2 { font-size: 1.3em; color: var(--text-primary); margin-bottom: 8px; }
  .not-found p { color: var(--text-tertiary); }
  .not-found a { color: var(--accent); text-decoration: none; }

  /* MOBILE */
  @media (max-width: 600px) {
    .profile-header { padding: 24px 16px 20px; }
    .profile-avatar { width: 64px; height: 64px; }
    .profile-name { font-size: 1.3em; }
    .profile-lens { font-size: 0.85em; }
    .section-header { padding: 0 16px; padding-bottom: 12px; }
    .positions-list { padding: 16px; }
    .position-card { padding: 14px; }
    .allies-section { padding: 16px; }
    .ally-row { padding: 8px 12px; gap: 10px; }
    .ally-avatar { width: 32px; height: 32px; }
    .nav { padding: 0 16px; }
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <img src="https://newsreel.co/images/newsreel-wordmark-white.png" alt="newsreel">
      <div class="nav-label">Perspectives</div>
    </a>
    <div class="nav-links">
      <a class="nav-link" data-page="search">Search</a>
      <a class="nav-link" data-page="voices">Voices</a>
      <a class="nav-link" data-page="methodology">Methodology</a>
    </div>
  </div>
</div>

<div id="profileContent">
  <div class="loading-state"><div class="spinner"></div>Loading profile...</div>
</div>

<script>
const BASE = location.pathname.includes('/perspectives') ? '/perspectives' : '';
const PAGES = { search: BASE || '/', voices: BASE + '/voices', methodology: BASE + '/methodology' };
document.querySelectorAll('.nav-link').forEach(a => { a.href = PAGES[a.dataset.page] || '#'; });
document.querySelector('.nav-brand').href = PAGES.search;

const CLUSTER_COLORS = ['#60A5FA','#F87171','#FBBF24','#A78BFA','#4ADE80','#22D3EE','#F472B6','#FB923C'];
function topicColor(topic) {
  let hash = 0;
  for (let i = 0; i < topic.length; i++) hash = topic.charCodeAt(i) + ((hash << 5) - hash);
  return CLUSTER_COLORS[Math.abs(hash) % CLUSTER_COLORS.length];
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function fullPlatformName(p) {
  return {x:'X', youtube:'YouTube', bluesky:'Bluesky', tiktok:'TikTok', instagram:'Instagram', substack:'Substack', podcast:'Podcast'}[p] || p;
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  const days = Math.floor((now - d) / 86400000);
  if (days > 30) return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  if (days > 0) return `${days}d ago`;
  const hrs = Math.floor((now - d) / 3600000);
  if (hrs > 0) return `${hrs}h ago`;
  return 'just now';
}

async function loadProfile() {
  const container = document.getElementById('profileContent');
  const path = location.pathname;
  const voiceId = path.split('/voice/').pop()?.replace(/\/$/, '') || path.split('/').pop();

  if (!voiceId) {
    container.innerHTML = '<div class="not-found"><h2>No voice specified</h2><p><a href="' + PAGES.voices + '">Browse all voices</a></p></div>';
    return;
  }

  // Load voice metadata
  let voices = [], voice = null;
  try {
    const resp = await fetch(BASE + '/data/voices.json');
    voices = await resp.json();
    voice = voices.find(v => v.id === voiceId);
  } catch(e) {}

  if (!voice) {
    container.innerHTML = `<div class="not-found"><h2>Voice not found</h2><p>"${escapeHtml(voiceId)}" isn't in our database.</p><p><a href="${PAGES.voices}">Browse all voices</a></p></div>`;
    return;
  }

  document.title = `${voice.name} — Perspectives`;

  // Load posts (try today, yesterday, day before)
  const now = new Date();
  const dates = [
    now.toISOString().split('T')[0],
    new Date(now - 86400000).toISOString().split('T')[0],
    new Date(now - 172800000).toISOString().split('T')[0],
  ];
  let postData = null;
  for (const date of dates) {
    try {
      const resp = await fetch(`${BASE}/data/posts/${voiceId}/${date}.json`);
      if (resp.ok) { postData = await resp.json(); break; }
    } catch(e) {}
  }

  // Photo lookup for allies
  const voicePhotoMap = {};
  for (const v of voices) { voicePhotoMap[v.id] = v.photo; }

  // Load stories for cluster context
  let storyItems = [];
  try {
    let resp = await fetch(BASE + '/api/stories');
    storyItems = await resp.json();
    if (!storyItems || storyItems.length === 0) {
      resp = await fetch(BASE + '/api/fractures');
      storyItems = await resp.json();
    }
  } catch(e) {}

  // Normalize story formats
  const normalizedStories = (storyItems || []).map(s => ({
    topicDisplay: s.headline || s.topicDisplay || '',
    topicSlug: (s.topicSlugs || [])[0] || s.topic || '',
    clusters: s.clusters || [],
    insight: s.summary || s.insight || '',
  }));

  // Find which clusters this voice is in
  const clusterMap = {}; // topicSlug -> { clusterName, allies[] }
  for (const f of normalizedStories) {
    for (const cluster of f.clusters) {
      const inCluster = cluster.voices.find(v => v.voiceId === voiceId);
      if (inCluster) {
        const allies = cluster.voices.filter(v => v.voiceId !== voiceId).map(a => ({
          ...a,
          photo: voicePhotoMap[a.voiceId] || a.photo,
        }));
        clusterMap[f.topicSlug] = {
          storyHeadline: f.topicDisplay,
          clusterName: cluster.name,
          allies,
        };
        break;
      }
    }
  }

  // Build unified positions list — every topic, same card structure
  const posts = postData?.posts || [];
  const topicSummary = postData?.topicSummary || {};
  const topics = Object.keys(topicSummary).filter(t => t !== 'uncategorized' && (topicSummary[t] || []).length > 0);
  const platforms = [...new Set(posts.map(p => p.platform))];

  const photoUrl = voice.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(voice.name)}&background=252528&color=a1a1aa&size=160`;

  // Platform links (not stat boxes — actual useful links)
  const h = voice.handles || {};
  const feeds = voice.feeds || {};
  let platformLinks = [];
  if (h.x) platformLinks.push(`<a class="platform-pill" href="https://x.com/${h.x}" target="_blank">X</a>`);
  if (h.youtube) {
    const yt = h.youtube.startsWith('@') ? h.youtube : (h.youtube.includes('/') ? h.youtube : '@'+h.youtube);
    platformLinks.push(`<a class="platform-pill" href="https://youtube.com/${yt}" target="_blank">YouTube</a>`);
  }
  if (h.bluesky) platformLinks.push(`<a class="platform-pill" href="https://bsky.app/profile/${h.bluesky}" target="_blank">Bluesky</a>`);
  if (h.tiktok) platformLinks.push(`<a class="platform-pill" href="https://tiktok.com/@${h.tiktok}" target="_blank">TikTok</a>`);
  if (h.instagram) platformLinks.push(`<a class="platform-pill" href="https://instagram.com/${h.instagram}" target="_blank">Instagram</a>`);
  if (feeds.substack) platformLinks.push(`<a class="platform-pill" href="${feeds.substack.replace(/\/feed\/?$/, '')}" target="_blank">Substack</a>`);
  if (feeds.podcast) platformLinks.push(`<span class="platform-pill">Podcast</span>`);

  const platformsHtml = platformLinks.length > 0
    ? `<div class="profile-platforms">${platformLinks.join('')}</div>`
    : '';

  // Tags
  const tagsHtml = (voice.tags || []).map(t => `<span class="profile-tag">${escapeHtml(t)}</span>`).join('');

  // Build position cards — one consistent design
  let positionsHtml = '';
  const usedTopics = new Set();

  // Sort topics: those with cluster context first, then by number of quotes
  const sortedTopics = [...topics].sort((a, b) => {
    const aHasCluster = clusterMap[a] ? 1 : 0;
    const bHasCluster = clusterMap[b] ? 1 : 0;
    if (aHasCluster !== bHasCluster) return bHasCluster - aHasCluster;
    return (topicSummary[b] || []).length - (topicSummary[a] || []).length;
  });

  for (const topic of sortedTopics) {
    const quotes = topicSummary[topic] || [];
    if (quotes.length === 0) continue;
    usedTopics.add(topic);

    const bestQuote = quotes[0];
    const color = topicColor(topic);
    const cluster = clusterMap[topic];

    // Topic label + cluster badge (if in a story)
    const clusterBadge = cluster
      ? `<span class="position-cluster" style="background: ${color}15; color: ${color};">${escapeHtml(cluster.clusterName)}</span>`
      : '';

    // Source link — always present
    const platformName = fullPlatformName(bestQuote.platform);
    const time = timeAgo(bestQuote.timestamp);
    const sourceLink = bestQuote.sourceUrl
      ? `<a href="${bestQuote.sourceUrl}" target="_blank">View on ${platformName} &rarr;</a>`
      : `<span>${platformName}</span>`;

    // Cluster allies context (if in a story)
    let alliesHtml = '';
    if (cluster && cluster.allies.length > 0) {
      const avatars = cluster.allies.slice(0, 5).map(a => {
        const photo = a.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(a.voiceName)}&background=252528&color=a1a1aa&size=48`;
        return `<a href="${BASE}/voice/${a.voiceId}" title="${escapeHtml(a.voiceName)}"><img class="cluster-context-avatar" src="${photo}" alt="${escapeHtml(a.voiceName)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(a.voiceName)}&background=252528&color=a1a1aa&size=48'"></a>`;
      }).join('');
      const names = cluster.allies.slice(0, 3).map(a => a.voiceName).join(', ');
      const more = cluster.allies.length > 3 ? ` +${cluster.allies.length - 3} more` : '';

      alliesHtml = `
        <div class="cluster-context">
          <div class="cluster-context-label">Others in "${escapeHtml(cluster.clusterName)}"</div>
          <div style="display:flex; align-items:center;">
            <div class="cluster-context-avatars">${avatars}</div>
            <div class="cluster-context-names">${escapeHtml(names)}${more}</div>
          </div>
        </div>
      `;
    }

    positionsHtml += `
      <div class="position-card">
        <div class="position-top-row">
          <span class="position-topic" style="color: ${color};">${escapeHtml(topic.replace(/-/g, ' '))}</span>
          ${clusterBadge}
        </div>
        <div class="position-quote">"${escapeHtml((bestQuote.quote || bestQuote.text || '').substring(0, 280))}"</div>
        <div class="position-meta">
          <span>${platformName}</span>
          ${time ? `<span>${time}</span>` : ''}
          ${sourceLink}
        </div>
        ${alliesHtml}
      </div>
    `;
  }

  if (!positionsHtml) {
    positionsHtml = '<div class="empty-state">No recent positions found. Check back after the next daily collection.</div>';
  }

  // Build aligned voices section
  let alignedHtml = '';
  const allyCount = {};
  for (const [topicSlug, cluster] of Object.entries(clusterMap)) {
    for (const ally of cluster.allies) {
      if (!allyCount[ally.voiceId]) {
        allyCount[ally.voiceId] = { ...ally, count: 0, topics: [] };
      }
      allyCount[ally.voiceId].count++;
      allyCount[ally.voiceId].topics.push(topicSlug.replace(/-/g, ' '));
    }
  }
  const sortedAllies = Object.values(allyCount).sort((a, b) => b.count - a.count);
  const totalStories = Object.keys(clusterMap).length;

  if (sortedAllies.length > 0) {
    for (const ally of sortedAllies.slice(0, 6)) {
      const photo = ally.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(ally.voiceName)}&background=252528&color=a1a1aa&size=72`;
      alignedHtml += `
        <a class="ally-row" href="${BASE}/voice/${ally.voiceId}" style="text-decoration:none; color:inherit;">
          <img class="ally-avatar" src="${photo}" alt="${escapeHtml(ally.voiceName)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(ally.voiceName)}&background=252528&color=a1a1aa&size=72'">
          <div class="ally-info">
            <div class="ally-name">${escapeHtml(ally.voiceName)}</div>
            <div class="ally-detail">${ally.topics.join(', ')}</div>
          </div>
          ${totalStories > 1 ? `<div class="ally-badge" style="background: rgba(74, 222, 128, 0.12); color: #4ADE80;">${ally.count}/${totalStories}</div>` : ''}
        </a>
      `;
    }
  }

  // Render
  container.innerHTML = `
    <div class="profile-header">
      <img class="profile-avatar" src="${photoUrl}" alt="${escapeHtml(voice.name)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(voice.name)}&background=252528&color=a1a1aa&size=160'">
      <div class="profile-name">${escapeHtml(voice.name)}</div>
      ${voice.lens ? `<div class="profile-lens">${escapeHtml(voice.lens)}</div>` : ''}
      ${tagsHtml ? `<div class="profile-tags">${tagsHtml}</div>` : ''}
      ${platformsHtml}
    </div>

    <div class="section-header">
      <span class="section-title">Positions</span>
      <span class="section-count">${sortedTopics.length} topics today</span>
    </div>
    <div class="positions-list">${positionsHtml}</div>

    ${alignedHtml ? `
      <div class="section-header">
        <span class="section-title">Aligned with</span>
        <span class="section-count">based on ${totalStories} stories</span>
      </div>
      <div class="allies-section">${alignedHtml}</div>
    ` : ''}
  `;
}

loadProfile();
</script>

</body>
</html>
