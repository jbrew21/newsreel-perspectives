<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perspectives — Story Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000; color:#fff;
    font-family:'DM Sans',Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .container { max-width:640px; margin:0 auto; padding:0 20px; }

  /* Story picker */
  .picker {
    padding:20px 0;
    border-bottom:1px solid #222;
  }
  .picker label {
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:#808080;
    text-transform:uppercase; letter-spacing:1.2px; display:block; margin-bottom:8px;
  }
  .picker select {
    width:100%; padding:10px 14px;
    background:#111; color:#fff; border:1px solid #333; border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:14px;
    cursor:pointer;
  }
  .picker select:focus { outline:none; border-color:#FF6343; }

  /* Header */
  .header {
    padding:20px 0;
    border-bottom:1px solid #222;
    display:flex; justify-content:space-between; align-items:center;
  }
  .header img { height:24px; }
  .header-label { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#FF6343; text-transform:uppercase; letter-spacing:1.2px; font-weight:700; }

  /* Hero */
  .hero { padding:32px 0 28px; border-bottom:1px solid #222; }
  .hero-label { font-family:'IBM Plex Mono',monospace; font-size:9px; color:#808080; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
  .hero h1 { font-family:'Bree Serif',Georgia,serif; font-size:28px; font-weight:normal; line-height:1.25; margin-bottom:10px; }
  .hero-meta { font-size:13px; color:#808080; }
  .hero-meta strong { color:#B0B0B0; }

  /* Stats row */
  .stats {
    display:flex; gap:20px; margin-top:16px; padding:12px 16px;
    background:#111; border-radius:8px;
  }
  .stat { text-align:center; flex:1; }
  .stat-num { font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:700; color:#FF6343; }
  .stat-label { font-size:11px; color:#808080; margin-top:2px; }

  /* Summary bar */
  .summary-bar {
    display:flex; height:6px; border-radius:3px; overflow:hidden;
    margin:24px 0 8px; gap:2px;
  }
  .summary-segment { border-radius:3px; transition:flex 0.3s ease; }
  .summary-labels {
    display:flex; justify-content:space-between;
    font-size:11px; color:#808080; margin-bottom:32px;
  }

  /* Cluster section */
  .cluster {
    padding:28px 0;
    border-bottom:1px solid #1a1a1a;
    animation: fadeIn 0.4s ease both;
  }
  .cluster:nth-child(2) { animation-delay:0.1s; }
  .cluster:nth-child(3) { animation-delay:0.2s; }
  .cluster:nth-child(4) { animation-delay:0.3s; }

  .cluster-header {
    display:flex; align-items:center; gap:12px;
    margin-bottom:20px;
  }
  .cluster-bar { width:4px; height:24px; border-radius:2px; flex-shrink:0; }
  .cluster-title { font-size:18px; font-weight:600; flex:1; }
  .cluster-count {
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:#808080;
    background:#1a1a1a; padding:4px 10px; border-radius:20px;
  }

  /* Voice cards */
  .voices { display:flex; flex-direction:column; gap:12px; }

  .voice-card {
    display:flex; gap:14px; padding:16px;
    background:#111; border-radius:12px;
    cursor:pointer; transition:all 0.2s ease;
    border:1px solid transparent;
  }
  .voice-card:hover {
    background:#1a1a1a; border-color:#333;
    transform:translateY(-1px);
  }
  .voice-card.expanded { background:#1a1a1a; border-color:#333; }

  .voice-photo {
    width:48px; height:48px; border-radius:50%; flex-shrink:0;
    object-fit:cover;
    filter:grayscale(100%) contrast(1.1);
    transition:filter 0.3s ease;
    background:#222;
  }
  .voice-card:hover .voice-photo,
  .voice-card.expanded .voice-photo { filter:grayscale(0%); }

  .voice-info { flex:1; min-width:0; }
  .voice-name { font-size:15px; font-weight:600; margin-bottom:2px; }
  .voice-platform {
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:#808080;
    text-transform:uppercase; letter-spacing:0.5px;
  }

  .voice-quote {
    display:none; margin-top:12px;
    font-size:14px; color:#C8C8C8; line-height:1.5;
    padding-left:14px;
    border-left:2px solid #333;
  }
  .voice-card.expanded .voice-quote { display:block; }

  .voice-link { display:none; margin-top:10px; }
  .voice-card.expanded .voice-link { display:block; }
  .voice-link a {
    font-family:'IBM Plex Mono',monospace; font-size:11px;
    color:#FF6343; text-decoration:none;
    display:inline-flex; align-items:center; gap:4px;
  }
  .voice-link a:hover { text-decoration:underline; }

  .expand-hint { font-size:11px; color:#555; margin-top:2px; transition:color 0.2s; }
  .voice-card:hover .expand-hint { color:#808080; }
  .voice-card.expanded .expand-hint { display:none; }

  /* Empty state */
  .empty {
    text-align:center; padding:60px 20px;
    color:#555; font-size:14px;
  }
  .empty h2 { font-family:'Bree Serif',serif; font-size:22px; color:#808080; margin-bottom:8px; }

  /* Footer */
  .footer {
    padding:32px 0;
    border-top:1px solid #222;
    text-align:center;
  }
  .footer-logo { height:20px; margin-bottom:8px; opacity:0.5; }
  .footer p { font-size:12px; color:#555; }
  .footer a { color:#FF6343; text-decoration:none; }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* Loading */
  .loading { text-align:center; padding:60px; color:#808080; }
  .loading .spinner {
    width:24px; height:24px; border:2px solid #333; border-top-color:#FF6343;
    border-radius:50%; animation:spin 0.8s linear infinite;
    margin:0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="container">

  <!-- Story Picker -->
  <div class="picker">
    <label>Select a story</label>
    <select id="storySelect" onchange="loadStory(this.value)">
      <option value="">Loading stories...</option>
    </select>
  </div>

  <!-- Header -->
  <div class="header">
    <img src="https://newsreel.co/images/newsreel-wordmark-white.png" alt="newsreel">
    <div class="header-label">&#9679; Perspectives</div>
  </div>

  <div id="content">
    <div class="empty">
      <h2>Select a story above</h2>
      <p>Run the pipeline to generate stories, then view them here.</p>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <img class="footer-logo" src="https://newsreel.co/images/newsreel-wordmark-white.png" alt="newsreel"><br>
    <p style="margin-top:8px;">Perspectives powered by <a href="https://newsreel.co">Newsreel</a></p>
    <p style="margin-top:4px;">Sources scraped from X, Bluesky, YouTube, TikTok, Instagram</p>
  </div>

</div>

<script>
// Voice data (loaded inline from voices.json for local testing)
let VOICES = {};

const CLUSTER_COLORS = ['#EF4444','#3B82F6','#F59E0B','#A855F7','#10B981','#F472B6','#6366F1','#14B8A6'];

async function init() {
  // Load voices
  try {
    const resp = await fetch('data/voices.json');
    const voices = await resp.json();
    voices.forEach(v => VOICES[v.id] = v);
  } catch(e) {
    console.warn('Could not load voices.json:', e);
  }

  // Load story list
  const select = document.getElementById('storySelect');
  try {
    // Try loading story index — we'll fetch each JSON file
    const stories = await discoverStories();
    select.innerHTML = '<option value="">Choose a story...</option>';
    stories.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.file;
      opt.textContent = s.headline;
      select.appendChild(opt);
    });

    // Auto-load from URL param
    const params = new URLSearchParams(location.search);
    const storyParam = params.get('story');
    if (storyParam) {
      const match = stories.find(s => s.file.includes(storyParam));
      if (match) {
        select.value = match.file;
        loadStory(match.file);
      }
    }
  } catch(e) {
    select.innerHTML = '<option value="">Error loading stories</option>';
    console.error(e);
  }
}

async function discoverStories() {
  // Fetch known story files from a manifest or try common names
  // For local dev, we'll try fetching story files directly
  const knownFiles = STORY_FILES; // injected by server or hardcoded
  const stories = [];
  for (const file of knownFiles) {
    try {
      const resp = await fetch('data/stories/' + file);
      if (resp.ok) {
        const data = await resp.json();
        stories.push({ file: file, headline: data.headline, date: data.date });
      }
    } catch(e) {}
  }
  return stories.sort((a,b) => b.date.localeCompare(a.date));
}

async function loadStory(file) {
  if (!file) return;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading story...</div>';

  try {
    const resp = await fetch('data/stories/' + file);
    const story = await resp.json();
    renderStory(story);
  } catch(e) {
    content.innerHTML = '<div class="empty"><h2>Error loading story</h2><p>' + e.message + '</p></div>';
  }
}

function renderStory(story) {
  const content = document.getElementById('content');
  const reactions = story.reactions || [];
  const clusters = story.argumentClusters || [];

  // Group reactions by cluster
  const clusterMap = {};
  reactions.forEach(r => {
    const key = r.argumentCluster || 'Uncategorized';
    if (!clusterMap[key]) clusterMap[key] = [];
    clusterMap[key].push(r);
  });

  const clusterKeys = Object.keys(clusterMap);
  const totalVoices = reactions.length;
  const uniqueVoices = [...new Set(reactions.map(r => r.voiceId))].length;

  let html = '';

  // Hero
  html += `
    <div class="hero">
      <div class="hero-label">${story.date || ''}</div>
      <h1>${story.headline}</h1>
      <p class="hero-meta">
        <strong>${uniqueVoices} voices</strong> weighed in &middot; <strong>${clusterKeys.length} arguments</strong> emerged
      </p>
      <div class="stats">
        <div class="stat">
          <div class="stat-num">${uniqueVoices}</div>
          <div class="stat-label">Voices matched</div>
        </div>
        <div class="stat">
          <div class="stat-num">${clusterKeys.length}</div>
          <div class="stat-label">Arguments</div>
        </div>
        <div class="stat">
          <div class="stat-num">${totalVoices}</div>
          <div class="stat-label">Total quotes</div>
        </div>
      </div>
    </div>
  `;

  // Summary bar
  if (clusterKeys.length > 0) {
    html += '<div class="summary-bar">';
    clusterKeys.forEach((key, i) => {
      const count = clusterMap[key].length;
      html += `<div class="summary-segment" style="flex:${count}; background:${CLUSTER_COLORS[i % CLUSTER_COLORS.length]};"></div>`;
    });
    html += '</div>';
    html += `<div class="summary-labels"><span>${clusterKeys.length} arguments</span><span>${uniqueVoices} voices total</span></div>`;
  }

  // Clusters
  clusterKeys.forEach((clusterName, ci) => {
    const voices = clusterMap[clusterName];
    const color = CLUSTER_COLORS[ci % CLUSTER_COLORS.length];

    html += `
      <div class="cluster">
        <div class="cluster-header">
          <div class="cluster-bar" style="background:${color};"></div>
          <div class="cluster-title">${clusterName}</div>
          <div class="cluster-count">${voices.length} voice${voices.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="voices">
    `;

    voices.forEach(r => {
      const voice = VOICES[r.voiceId] || {};
      const name = voice.name || r.voiceId;
      const photo = voice.photo || '';
      const followers = voice.followersDisplay || '';
      const platform = r.platform || '';
      const quote = (r.quote || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const url = r.sourceUrl || '#';

      html += `
        <div class="voice-card" onclick="this.classList.toggle('expanded')">
          <img class="voice-photo" src="${photo}" alt="${name}" onerror="this.style.background='#333'">
          <div class="voice-info">
            <div class="voice-name">${name}</div>
            <div class="voice-platform">${platform}${followers ? ' &middot; ' + followers + ' followers' : ''}</div>
            <div class="expand-hint">Tap to see quote</div>
            <div class="voice-quote">&ldquo;${quote}&rdquo;</div>
            <div class="voice-link">
              <a href="${url}" target="_blank" rel="noopener">View original post &rarr;</a>
            </div>
          </div>
        </div>
      `;
    });

    html += '</div></div>';
  });

  // Empty state if no reactions
  if (reactions.length === 0) {
    html += `
      <div class="empty" style="padding:40px 0;">
        <h2>No reactions matched</h2>
        <p>The pipeline found posts but Claude couldn't verify any as direct quotes for this story.</p>
        <p style="margin-top:8px;">This usually means the web search results were summaries, not actual quotes.</p>
      </div>
    `;
  }

  content.innerHTML = html;
}

// Story file list — injected below
const STORY_FILES = [];
</script>

<!-- This script block will be replaced by the server with actual file list -->
<script id="story-manifest"></script>

</body>
</html>
