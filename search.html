<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perspectives -- Step Outside Your Algorithm</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg-base: #0a0a0b;
    --bg-card: #141416;
    --bg-elevated: #1c1c1f;
    --bg-hover: #252528;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --text-dim: #52525b;
    --border: rgba(255,255,255,0.06);
    --accent: #FF6343;
    --accent-bg: rgba(255,99,67,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--text-secondary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  .nav { max-width:680px; margin:0 auto; padding:20px 20px 0; display:flex; justify-content:space-between; align-items:center; }
  .nav-brand { display:flex; align-items:baseline; gap:0; text-decoration:none; }
  .nav-brand-text { font-size:1.6em; font-weight:700; color:var(--text-primary); letter-spacing:-0.03em; }
  .nav-brand-accent { color:var(--accent); }
  .nav-live { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); margin-top:2px; }
  .nav-live-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .nav-voices-btn {
    font-size:13px; font-weight:600; color:var(--text-secondary);
    background:var(--bg-elevated); border:1px solid var(--border);
    border-radius:20px; padding:8px 16px; text-decoration:none;
    transition:all 0.2s;
  }
  .nav-voices-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ── SEARCH ── */
  .search-section { max-width:680px; margin:0 auto; padding:16px 20px 0; }
  .search-box { position:relative; }
  .search-box input {
    width:100%; padding:14px 80px 14px 16px;
    font-size:15px; font-family:'DM Sans',sans-serif;
    border:1px solid var(--border); border-radius:12px;
    background:var(--bg-card); color:var(--text-primary);
    outline:none; transition:border 0.2s;
  }
  .search-box input:focus { border-color:var(--accent); }
  .search-box input::placeholder { color:var(--text-dim); }
  .search-box button {
    position:absolute; right:5px; top:5px;
    padding:9px 18px; font-size:14px; font-weight:600;
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    cursor:pointer; font-family:inherit; transition:background 0.2s;
  }
  .search-box button:hover { background:#e5553a; }
  .search-box button:disabled { background:#555; cursor:not-allowed; }

  .search-hints { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; justify-content:center; }
  .search-hint {
    font-size:12px; color:var(--text-muted); background:var(--bg-card);
    border:1px solid var(--border); border-radius:100px;
    padding:5px 12px; cursor:pointer; transition:all 0.15s;
  }
  .search-hint:hover { color:var(--text-secondary); border-color:var(--text-muted); }
  .search-hint.curated { border-style:dashed; }

  .time-filter {
    display:none; gap:6px; justify-content:center; margin-top:8px; flex-wrap:wrap;
    align-items:center;
  }
  .time-label { font-size:11px; color:var(--text-dim); margin-right:4px; }
  .time-btn {
    background:var(--bg-elevated); color:var(--text-muted);
    border:1px solid var(--border); padding:4px 12px;
    border-radius:16px; font-size:11px; cursor:pointer;
    font-family:inherit; transition:all 0.15s;
  }
  .time-btn:hover { border-color:var(--text-muted); color:var(--text-secondary); }
  .time-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ── STORIES FEED ── */
  .feed { max-width:680px; margin:0 auto; padding:24px 20px 60px; }
  .feed-header { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px; text-align:center; }

  /* ── STORY CARD (matches app design) ── */
  .story-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:16px; padding:20px; margin-bottom:16px;
    cursor:pointer; transition:all 0.2s;
  }
  .story-card:hover { border-color:rgba(255,255,255,0.12); transform:translateY(-1px); }
  .story-card:active { transform:translateY(0); }

  .story-headline {
    font-size:1.25em; font-weight:700; color:var(--text-primary);
    line-height:1.25; letter-spacing:-0.01em; margin-bottom:6px;
  }
  .story-meta {
    font-size:13px; color:var(--text-muted); margin-bottom:16px;
  }

  /* VS layout */
  .vs-layout {
    display:flex; align-items:center; justify-content:center;
    gap:12px; margin-bottom:16px;
  }
  .vs-side { display:flex; flex-direction:column; align-items:center; flex:1; min-width:0; }
  .vs-faces { display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
  .vs-face {
    width:44px; height:44px; border-radius:50%; object-fit:cover;
    border:2px solid var(--bg-card); margin-left:-10px;
    background:var(--bg-elevated); position:relative;
  }
  .vs-face:first-child { margin-left:0; }
  .vs-cluster-name {
    font-size:12px; font-weight:600; text-align:center;
    line-height:1.3; max-width:140px;
  }
  .vs-cluster-count {
    font-size:12px; color:var(--text-muted); margin-top:2px;
  }
  .vs-badge {
    width:36px; height:36px; border-radius:50%;
    background:var(--bg-elevated); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:var(--text-muted);
    flex-shrink:0;
  }

  /* Proportion bar */
  .proportion-bar {
    display:flex; height:6px; border-radius:3px; overflow:hidden;
    margin-bottom:12px; background:var(--bg-elevated);
  }
  .proportion-segment { height:100%; transition:width 0.3s; }

  /* CTA */
  .story-cta {
    font-size:13px; font-weight:600; color:var(--accent);
    text-align:right; display:flex; align-items:center;
    justify-content:flex-end; gap:4px;
  }
  .story-cta svg { transition:transform 0.2s; }
  .story-card:hover .story-cta svg { transform:translateX(2px); }

  /* ── WIRE ── */
  .wire-section { max-width:680px; margin:0 auto; padding:0 20px 60px; }
  .wire-header { margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .wire-title { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; display:flex; align-items:center; gap:8px; }
  .wire-subtitle { font-size:13px; color:var(--text-muted); margin-top:4px; }
  .wire-feed { max-height:500px; overflow-y:auto; }
  .wire-entry {
    display:flex; align-items:center; gap:10px;
    padding:8px 0; border-bottom:1px solid var(--border);
    font-size:13px; line-height:1.4;
  }
  .wire-entry:last-child { border-bottom:none; }
  .wire-photo { width:28px; height:28px; border-radius:50%; object-fit:cover; background:var(--bg-elevated); flex-shrink:0; }
  .wire-name { font-weight:600; color:var(--text-primary); text-decoration:none; white-space:nowrap; }
  .wire-name:hover { color:var(--accent); }
  .wire-platform { font-size:10px; font-weight:700; padding:2px 6px; border-radius:100px; white-space:nowrap; text-transform:uppercase; letter-spacing:0.05em; flex-shrink:0; }
  .wire-text { color:var(--text-muted); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wire-time { font-size:11px; color:var(--text-dim); white-space:nowrap; flex-shrink:0; }

  /* ── SEARCH RESULTS ── */
  .results { max-width:680px; margin:0 auto; padding:0 20px 60px; }
  .results-header { text-align:center; padding:20px 0 16px; }
  .results-header h2 { font-size:1.1em; color:var(--text-primary); margin-bottom:4px; }
  .results-topics { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-top:8px; }
  .results-topic-tag { font-size:11px; background:var(--accent-bg); color:var(--accent); padding:2px 8px; border-radius:4px; }

  .voice-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:14px; padding:16px; margin-bottom:10px;
    transition:border-color 0.2s;
  }
  .voice-card:hover { border-color:rgba(255,255,255,0.1); }
  .voice-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .voice-photo { width:42px; height:42px; border-radius:50%; object-fit:cover; background:var(--bg-elevated); }
  .voice-name { font-size:15px; font-weight:700; color:var(--text-primary); text-decoration:none; }
  .voice-name:hover { color:var(--accent); }
  .voice-lens { font-size:12px; color:var(--text-muted); margin-top:2px; line-height:1.4; }
  .voice-cluster-badge {
    font-size:11px; font-weight:600; padding:3px 10px;
    border-radius:6px; background:rgba(255,255,255,0.08);
    color:var(--text-secondary); border:1px solid var(--border);
    margin-top:4px; display:inline-block;
  }
  .voice-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .voice-tag {
    font-size:11px; color:var(--text-muted); background:var(--bg-elevated);
    border:1px solid var(--border); border-radius:100px; padding:2px 10px;
  }
  .quote { margin-bottom:10px; padding-left:12px; border-left:3px solid var(--bg-hover); }
  .quote-platform { font-size:11px; color:var(--text-dim); font-weight:700; text-transform:uppercase; margin-bottom:3px; letter-spacing:0.05em; }
  .quote-text { font-size:13px; color:var(--text-secondary); line-height:1.5; margin-bottom:3px; }
  .quote-link { font-size:11px; color:var(--accent); text-decoration:none; }
  .quote-link:hover { text-decoration:underline; }

  .no-results { text-align:center; padding:60px; color:var(--text-muted); font-size:14px; }

  /* ── LOADING ── */
  .loading { text-align:center; padding:60px; color:var(--text-muted); font-size:14px; display:none; }
  .loading.active { display:block; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--bg-elevated); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── STATS ── */
  .stats { text-align:center; padding:12px 20px; color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:0.05em; font-weight:700; }
  .stats span { color:var(--text-primary); }

  /* ── MOBILE ── */
  @media (max-width:600px) {
    .nav { padding:16px 16px 0; }
    .nav-brand-text { font-size:1.3em; }
    .search-section { padding:12px 16px 0; }
    .feed { padding:20px 16px 40px; }
    .story-card { padding:16px; }
    .story-headline { font-size:1.1em; }
    .vs-face { width:38px; height:38px; margin-left:-8px; }
    .vs-badge { width:30px; height:30px; font-size:10px; }
    .vs-cluster-name { font-size:11px; max-width:110px; }
    .wire-section { padding:0 16px 40px; }
    .results { padding:0 16px 40px; }
    .wire-text { white-space:normal; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; padding-left:38px; width:100%; flex:none; }
    .wire-entry { flex-wrap:wrap; gap:6px; }
    .search-hint { min-height:36px; display:inline-flex; align-items:center; }
  }
</style>
</head>
<body>

<div class="nav">
  <div>
    <a class="nav-brand" id="homeLink" href="/">
      <span class="nav-brand-text">Perspec<span class="nav-brand-accent">tives</span></span>
    </a>
    <div class="nav-live"><div class="nav-live-dot"></div> Live</div>
  </div>
  <a class="nav-voices-btn" id="voicesBtn" href="/voices"><span id="voiceCount">257</span> Voices &rarr;</a>
</div>

<div class="search-section">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search any story..." autofocus>
    <button id="searchBtn" onclick="doSearch()">Search</button>
  </div>
  <div class="time-filter" id="timeFilter">
    <span class="time-label">Window:</span>
    <button class="time-btn active" data-days="" onclick="setTimeFilter(this)">Auto</button>
    <button class="time-btn" data-days="1" onclick="setTimeFilter(this)">Today</button>
    <button class="time-btn" data-days="3" onclick="setTimeFilter(this)">3d</button>
    <button class="time-btn" data-days="7" onclick="setTimeFilter(this)">Week</button>
    <button class="time-btn" data-days="14" onclick="setTimeFilter(this)">2w</button>
    <button class="time-btn" data-days="30" onclick="setTimeFilter(this)">Month</button>
  </div>
  <div class="search-hints" id="searchHints"></div>
</div>

<div class="feed" id="feed" style="display:none"></div>
<div class="stats" id="stats"></div>

<div class="wire-section" id="wireSection" style="display:none">
  <div class="wire-header">
    <div class="wire-title">The Wire</div>
    <div class="wire-subtitle" id="wireSubtitle">What voices are saying right now</div>
  </div>
  <div class="wire-feed" id="wireFeed"></div>
</div>

<div class="loading" id="loading"><span class="spinner"></span> Searching 257 voices...</div>
<div class="results" id="results"></div>

<script>
const BASE = location.pathname.includes('/perspectives') ? '/perspectives' : '';
const PAGES = { search: BASE || '/', voices: BASE + '/voices', methodology: BASE + '/methodology' };
document.getElementById('homeLink').href = PAGES.search;
document.getElementById('voicesBtn').href = PAGES.voices;

const COLORS = ['#60A5FA','#F87171','#FBBF24','#A78BFA','#4ADE80','#22D3EE','#F472B6','#FB923C'];
const PLATFORM = {x:'X',youtube:'YouTube',bluesky:'Bluesky',instagram:'Instagram',tiktok:'TikTok',substack:'Substack',podcast:'Podcast'};
const PLATFORM_COLORS = {x:'#1DA1F2',youtube:'#FF0000',substack:'#FF6719',bluesky:'#0085FF',instagram:'#E1306C',tiktok:'#00F2EA',podcast:'#9B59B6'};

const TAG_GLOSSARY = {
  'hawkish':'Favors strong military action','anti-establishment':'Skeptical of institutional power',
  'contrarian':'Takes positions against consensus','centrist':'Doesn\'t align consistently with either party',
  'populist':'Frames issues as people vs elites','progressive':'Advocates systemic change',
  'conservative':'Traditional values, limited government','libertarian-leaning':'Individual freedom, skeptical of government',
  'constitutionalist':'Frames arguments through constitutional law','digital media':'Reaches audiences via social platforms',
  'heterodox':'Positions cross left-right lines','pro-Trump':'Supportive of Trump agenda',
  'anti-Trump':'Critical of Trump/MAGA','MAGA':'Aligned with Make America Great Again',
  'free speech':'Prioritizes broad speech protections','anti-woke':'Critical of progressive social justice activism',
  'pro-Israel':'Supports strong U.S.-Israel alliance','anti-war':'Opposes military intervention',
};

let _voiceLens = {};
let _voiceCategory = {};
let _voiceApproach = {};
fetch(BASE + '/data/voices.json').then(r=>r.json()).then(voices => {
  document.getElementById('voiceCount').textContent = voices.length;
  for (const v of voices) {
    _voiceLens[v.id] = v.lens || '';
    _voiceCategory[v.id] = v.category || '';
    _voiceApproach[v.id] = v.approach || '';
  }
}).catch(()=>{});

function esc(t) { const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
function slugify(t) { return t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').substring(0,60); }

// ── STORY CARD RENDERER (app design) ──
function renderStoryCard(story) {
  const clusters = story.clusters || [];
  const clusterCount = clusters.length;
  const totalVoices = story.voiceCount || clusters.reduce((s,c) => s + (c.voiceCount || (c.voices||[]).length), 0);

  // Pick two dominant clusters for VS layout
  const sorted = [...clusters].sort((a,b) => (b.voiceCount||(b.voices||[]).length) - (a.voiceCount||(a.voices||[]).length));
  const left = sorted[0];
  const right = sorted[1];

  function renderSide(cluster, ci) {
    if (!cluster) return '';
    const color = COLORS[ci % COLORS.length];
    const voices = cluster.voices || [];
    const count = cluster.voiceCount || voices.length;
    const faces = voices.slice(0,3).map(v => {
      const photo = v.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(v.voiceName)}&background=1c1c1f&color=a1a1aa&size=88`;
      return `<img class="vs-face" src="${photo}" alt="${esc(v.voiceName)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(v.voiceName)}&background=1c1c1f&color=a1a1aa&size=88'" title="${esc(v.voiceName)}${_voiceLens[v.voiceId] ? ' · '+_voiceLens[v.voiceId].substring(0,60) : ''}">`;
    }).join('');
    return `<div class="vs-side">
      <div class="vs-faces">${faces}</div>
      <div class="vs-cluster-name" style="color:${color};">${esc(cluster.name)}</div>
      <div class="vs-cluster-count">${count}</div>
    </div>`;
  }

  // Proportion bar
  let barHtml = '';
  if (clusters.length > 0) {
    const total = clusters.reduce((s,c) => s + (c.voiceCount||(c.voices||[]).length), 0) || 1;
    barHtml = clusters.map((c,ci) => {
      const pct = ((c.voiceCount||(c.voices||[]).length) / total * 100).toFixed(1);
      return `<div class="proportion-segment" style="width:${pct}%;background:${COLORS[ci%COLORS.length]};"></div>`;
    }).join('');
  }

  const slug = slugify(story.headline);

  return `<div class="story-card" onclick="window.location.href='${BASE}/story/${slug}'">
    <div class="story-headline">${esc(story.headline)}</div>
    <div class="story-meta">${totalVoices} voices &middot; ${clusterCount} positions</div>
    ${left ? `<div class="vs-layout">
      ${renderSide(left, 0)}
      <div class="vs-badge">vs</div>
      ${renderSide(right, 1)}
    </div>` : ''}
    <div class="proportion-bar">${barHtml}</div>
    <div class="story-cta">See ${clusterCount} positions <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
  </div>`;
}

// ── LOAD STORIES ──
let _storiesData = [];
async function loadFeed() {
  let stories = [];
  try {
    let resp = await fetch(BASE + '/api/stories');
    stories = await resp.json();
    if (!stories || stories.length === 0) {
      resp = await fetch(BASE + '/api/fractures');
      const f = await resp.json();
      stories = (f||[]).map(x => ({
        headline: x.headline||x.topicDisplay, summary: x.insight||'',
        type:'split', voiceCount:x.voiceCount, clusterCount:x.clusterCount, clusters:x.clusters,
      }));
    }
  } catch(e) { return; }

  if (!stories || stories.length === 0) return;
  _storiesData = stories;

  const feed = document.getElementById('feed');
  feed.style.display = 'block';

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const totalVoices = new Set();
  stories.forEach(s => (s.clusters||[]).forEach(c => (c.voices||[]).forEach(v => totalVoices.add(v.voiceId))));

  feed.innerHTML = `<div class="feed-header">${dateStr} &middot; ${stories.length} stories &middot; ${totalVoices.size} voices</div>` +
    stories.map(s => renderStoryCard(s)).join('');
}
loadFeed();

// ── WIRE ──
function wireTimeAgo(ts) {
  try {
    const d = Date.now() - new Date(ts).getTime();
    const h = Math.floor(d/3600000), m = Math.floor(d/60000);
    if (h > 24) return Math.floor(d/86400000)+'d';
    if (h > 0) return h+'h';
    if (m > 0) return m+'m';
    return 'now';
  } catch { return ''; }
}

fetch(BASE + '/api/wire').then(r=>r.json()).then(entries => {
  if (!entries || entries.length===0) return;
  document.getElementById('wireSection').style.display = 'block';
  const voiceSet = new Set(entries.map(e=>e.voiceId));
  document.getElementById('wireSubtitle').textContent = `What ${voiceSet.size} voices are saying right now`;
  const feed = document.getElementById('wireFeed');
  entries.slice(0,50).forEach(e => {
    const p = (e.platform||'').toLowerCase();
    const pColor = PLATFORM_COLORS[p]||'#aaa';
    feed.innerHTML += `<div class="wire-entry">
      <img class="wire-photo" src="${e.photo||`https://ui-avatars.com/api/?name=${encodeURIComponent(e.voiceName)}&background=1c1c1f&color=a1a1aa&size=56`}" alt="" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(e.voiceName)}&background=1c1c1f&color=a1a1aa&size=56'">
      <a class="wire-name" href="${BASE}/voice/${e.voiceId}">${esc(e.voiceName)}</a>
      <span class="wire-platform" style="background:${pColor}22;color:${pColor};">${PLATFORM[p]||p}</span>
      <span class="wire-text">${esc((e.text||'').substring(0,120))}</span>
      <span class="wire-time">${wireTimeAgo(e.timestamp)}</span>
    </div>`;
  });
}).catch(()=>{});

// ── TOPICS + HINTS ──
fetch(BASE + '/api/topics').then(r=>r.json()).then(topics => {
  const sorted = Object.entries(topics)
    .filter(([k,v]) => k!=='uncategorized' && [...new Set(v.map(e=>e.voiceName))].length >= 3)
    .sort((a,b) => b[1].length - a[1].length).slice(0,15);

  if (sorted.length > 0) {
    const hints = document.getElementById('searchHints');
    sorted.slice(0,4).forEach(([topic]) => {
      const el = document.createElement('div');
      el.className = 'search-hint';
      el.textContent = topic.replace(/-/g,' ');
      el.onclick = () => { input.value = el.textContent; doSearch(); };
      hints.appendChild(el);
    });

    const curated = ['reproductive rights','immigration','climate change','education','gun control','housing','criminal justice','voting rights','racial justice','healthcare','LGBTQ rights','media literacy'];
    const trendingSet = new Set(sorted.slice(0,4).map(([t])=>t.replace(/-/g,' ').toLowerCase()));
    curated.filter(t=>!trendingSet.has(t)).slice(0,6).forEach(topic => {
      const el = document.createElement('div');
      el.className = 'search-hint curated';
      el.textContent = topic;
      el.onclick = () => { input.value = topic; doSearch(); };
      hints.appendChild(el);
    });

    document.getElementById('stats').innerHTML = `<span>${Object.values(topics).flat().length}</span> posts from <span>${new Set(Object.values(topics).flat().map(e=>e.voiceId)).size}</span> voices across <span>${sorted.length}+</span> topics`;
  }
}).catch(()=>{});

// ── SEARCH ──
const input = document.getElementById('searchInput');
const loading = document.getElementById('loading');
const resultsDiv = document.getElementById('results');

input.addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
input.addEventListener('focus', () => { document.getElementById('timeFilter').style.display='flex'; });

let selectedDays = '';
function setTimeFilter(el) {
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  selectedDays = el.dataset.days;
  if (input.value.trim()) doSearch();
}

async function doSearch() {
  const q = input.value.trim();
  if (!q) return;

  document.getElementById('searchBtn').disabled = true;
  loading.classList.add('active');
  resultsDiv.innerHTML = '';
  document.getElementById('feed').style.display = 'none';
  document.getElementById('searchHints').style.display = 'none';
  document.getElementById('wireSection').style.display = 'none';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('timeFilter').style.display = 'flex';

  try {
    let url = `${BASE}/api/lookup?q=${encodeURIComponent(q)}`;
    if (selectedDays) url += `&days=${selectedDays}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.error) {
      resultsDiv.innerHTML = `<div class="no-results">${esc(data.error)}</div>`;
    } else {
      renderResults(data);
    }
  } catch(err) {
    resultsDiv.innerHTML = `<div class="no-results">Search failed: ${esc(err.message)}</div>`;
  }

  document.getElementById('searchBtn').disabled = false;
  loading.classList.remove('active');
}

function renderResults(data) {
  if (!data.voices || data.voices.length === 0) {
    resultsDiv.innerHTML = '<div class="no-results">No voices discussing this topic yet. We track 257+ voices across X, YouTube, Bluesky, Substack, Instagram, TikTok, and podcasts.</div>';
    return;
  }

  data.voices.sort((a,b) => b.quotes.length - a.quotes.length);

  const windowLabel = {
    '1d':'today','3d':'3 days','7d':'week','14d':'2 weeks','30d':'month'
  }[data.timeWindow] || data.timeWindow || '';

  let html = `<div class="results-header">
    <h2>${data.voices.length} voices on this story${windowLabel ? ` <span style="color:var(--text-dim);font-size:0.8em;">${windowLabel}</span>` : ''}</h2>
    ${data.broadeningNote ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px;">${esc(data.broadeningNote)}</div>` : ''}
    <div class="results-topics">${data.matchedTopics.map(t=>`<span class="results-topic-tag">${esc(t)}</span>`).join('')}</div>
  </div>`;

  for (const voice of data.voices) {
    const clusterBadge = voice.argumentCluster ? `<span class="voice-cluster-badge">${esc(voice.argumentCluster)}</span>` : '';
    const photo = voice.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(voice.voiceName)}&background=1c1c1f&color=a1a1aa&size=84`;
    const lens = voice.lens || _voiceLens[voice.voiceId] || '';
    const tags = (voice.tags||[]).map(t => {
      const tip = TAG_GLOSSARY[t.toLowerCase()];
      return `<span class="voice-tag"${tip ? ` title="${esc(tip)}" style="cursor:help;"` : ''}>${esc(t)}</span>`;
    }).join('');

    html += `<div class="voice-card">
      <div class="voice-header">
        <img class="voice-photo" src="${photo}" alt="${esc(voice.voiceName)}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(voice.voiceName)}&background=1c1c1f&color=a1a1aa&size=84'">
        <div>
          <a class="voice-name" href="${BASE}/voice/${voice.voiceId}">${esc(voice.voiceName)}</a>
          ${lens ? `<div class="voice-lens">${esc(lens)}</div>` : ''}
          ${clusterBadge}
        </div>
      </div>
      ${tags ? `<div class="voice-tags">${tags}</div>` : ''}
      ${voice.quotes.slice(0,3).map(q => {
        const pLabel = PLATFORM[q.platform]||q.platform;
        const isTranscript = q.quote && q.quote.length > 150 && q.platform === 'youtube';
        return `<div class="quote">
          <div class="quote-platform">${esc(pLabel)}${isTranscript?' (transcript)':''}</div>
          <div class="quote-text">"${esc((isTranscript ? q.quote.substring(0,350) : q.quote.substring(0,250)))}"</div>
          <a class="quote-link" href="${q.sourceUrl}" target="_blank">View original</a>
        </div>`;
      }).join('')}
    </div>`;
  }

  resultsDiv.innerHTML = html;
}
</script>
