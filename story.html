<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perspectives -- Story</title>
<meta name="description" content="See how 257 voices react to this story, clustered by argument.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0a0a0b;
    --bg-card: #141416;
    --bg-elevated: #1c1c1f;
    --bg-hover: #252528;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #8b8b96;
    --text-dim: #6e6e7a;
    --border: rgba(255,255,255,0.06);
    --accent: #FF6343;
    --accent-bg: rgba(255,99,67,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  :focus:not(:focus-visible) { outline:none; }

  body {
    font-family:'DM Sans',-apple-system,sans-serif;
    background:var(--bg-base); color:var(--text-secondary);
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }

  /* Nav */
  .nav { max-width:680px; margin:0 auto; padding:20px 20px 0; display:flex; justify-content:space-between; align-items:center; }
  .nav-brand { display:flex; align-items:baseline; text-decoration:none; }
  .nav-brand-text { font-size:1.6em; font-weight:700; color:var(--text-primary); letter-spacing:-0.03em; }
  .nav-brand-accent { color:var(--accent); }
  .nav-tagline { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .nav-back {
    font-size:13px; font-weight:600; color:var(--text-muted);
    text-decoration:none; display:flex; align-items:center; gap:4px;
    transition:color 0.2s;
  }
  .nav-back:hover { color:var(--accent); }

  /* Story header */
  .story-header { max-width:680px; margin:0 auto; padding:24px 20px 0; }
  .story-meta { font-size:13px; color:var(--text-muted); margin-bottom:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .story-headline { font-size:1.8em; font-weight:700; color:var(--text-primary); line-height:1.2; letter-spacing:-0.02em; margin-bottom:8px; }
  .story-summary { font-size:15px; color:var(--text-muted); line-height:1.5; margin-bottom:16px; max-width:600px; }

  /* Share */
  .share-btn {
    font-size:13px; font-weight:600; color:var(--text-muted);
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:10px; padding:8px 16px; cursor:pointer;
    font-family:inherit; display:inline-flex; align-items:center; gap:6px;
    transition:all 0.2s;
  }
  .share-btn:hover { border-color:var(--accent); color:var(--accent); }
  .share-toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--bg-hover); color:var(--text-primary);
    border:1px solid var(--border); padding:10px 20px; border-radius:10px;
    font-size:13px; font-weight:600; z-index:999; display:none;
  }

  /* Proportion bar (top level) */
  .story-proportion { max-width:680px; margin:0 auto; padding:20px 20px 0; }
  .proportion-bar { display:flex; height:8px; border-radius:4px; overflow:hidden; background:var(--bg-elevated); }
  .proportion-segment { height:100%; }
  .proportion-legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:10px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* Cluster cards */
  .clusters { max-width:680px; margin:0 auto; padding:20px 20px 60px; }
  .clusters-title { font-size:13px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }

  .cluster-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:16px; margin-bottom:12px; overflow:hidden;
    border-left:4px solid var(--cluster-color, #60A5FA);
  }
  .cluster-header {
    padding:16px 20px; cursor:pointer; display:flex;
    align-items:center; gap:10px; transition:background 0.15s;
  }
  .cluster-header:hover { background:rgba(255,255,255,0.02); }
  .cluster-name { font-size:15px; font-weight:600; flex:1; }
  .cluster-count { font-size:12px; color:var(--text-muted); font-weight:700; }
  .cluster-chevron { transition:transform 0.2s; flex-shrink:0; color:var(--text-dim); }
  .cluster-card.open .cluster-chevron { transform:rotate(180deg); }
  .cluster-body { display:none; padding:0 20px 16px; }
  .cluster-card.open .cluster-body { display:block; }

  /* Voice row */
  .voice-row {
    display:flex; align-items:flex-start; gap:12px;
    padding:12px; background:var(--bg-elevated);
    border-radius:12px; margin-bottom:8px;
    transition:background 0.15s;
  }
  .voice-row:hover { background:var(--bg-hover); }
  .voice-row-photo {
    width:40px; height:40px; border-radius:50%;
    object-fit:cover; background:var(--bg-hover); flex-shrink:0;
  }
  .voice-row-body { flex:1; min-width:0; }
  .voice-row-name { font-size:14px; font-weight:600; color:var(--text-primary); text-decoration:none; }
  .voice-row-name:hover { color:var(--accent); }
  .voice-row-platform { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-left:6px; }
  .voice-row-lens { font-size:12px; color:var(--text-muted); margin-top:2px; line-height:1.4; }
  .voice-row-quote { font-size:13px; color:var(--text-secondary); line-height:1.5; margin-top:6px; font-style:italic; }
  .voice-row-source { font-size:11px; color:var(--accent); text-decoration:none; margin-top:6px; display:inline-block; }
  .voice-row-source:hover { text-decoration:underline; }

  /* Loading / Error */
  .loading-state { text-align:center; padding:80px 20px; color:var(--text-muted); }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--bg-elevated); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error-state { text-align:center; padding:80px 20px; max-width:500px; margin:0 auto; }
  .error-state h2 { font-size:1.3em; color:var(--text-primary); margin-bottom:8px; }
  .error-state p { color:var(--text-muted); margin-bottom:20px; line-height:1.5; }
  .error-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:10px 20px; font-size:14px; font-weight:600;
    border-radius:10px; text-decoration:none; font-family:inherit;
    transition:all 0.2s; cursor:pointer;
  }
  .error-btn-primary { background:var(--accent); color:#fff; border:none; }
  .error-btn-primary:hover { background:#e5553a; }
  .error-btn-secondary { background:var(--bg-card); color:var(--text-muted); border:1px solid var(--border); margin-top:8px; }
  .error-btn-secondary:hover { border-color:var(--text-muted); color:var(--text-primary); }

  /* Footer */
  .site-footer { max-width:680px; margin:0 auto; padding:40px 20px 32px; border-top:1px solid var(--border); text-align:center; }
  .footer-brand { font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:8px; }
  .footer-brand span { color:var(--accent); }
  .footer-links { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-bottom:12px; }
  .footer-links a { font-size:13px; color:var(--text-muted); text-decoration:none; transition:color 0.2s; }
  .footer-links a:hover { color:var(--text-primary); }
  .footer-copy { font-size:12px; color:var(--text-dim); }

  @media (max-width:600px) {
    .nav { padding:16px 16px 0; }
    .nav-brand-text { font-size:1.3em; }
    .story-header { padding:20px 16px 0; }
    .story-headline { font-size:1.4em; }
    .story-proportion { padding:16px 16px 0; }
    .clusters { padding:16px 16px 40px; }
    .cluster-header { padding:14px 16px; }
    .cluster-body { padding:0 16px 14px; }
    .voice-row { padding:10px; gap:10px; }
    .voice-row-photo { width:36px; height:36px; }
    .site-footer { padding:32px 16px 24px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div>
    <a class="nav-brand" href="/" id="homeLink">
      <span class="nav-brand-text">Perspec<span class="nav-brand-accent">tives</span></span>
    </a>
    <div class="nav-tagline">by Newsreel</div>
  </div>
  <a class="nav-back" href="/" id="backLink">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    All stories
  </a>
</nav>

<div id="content">
  <div class="loading-state" id="loading"><span class="spinner"></span> Loading story...</div>
</div>

<div class="share-toast" id="shareToast">Link copied</div>

<footer class="site-footer">
  <div class="footer-brand">Perspec<span>tives</span> by Newsreel</div>
  <div class="footer-links">
    <a href="/methodology" id="methodLink">Methodology</a>
    <a href="/voices" id="voicesLink">All Voices</a>
    <a href="https://newsreel.co" target="_blank" rel="noopener">Newsreel</a>
    <a href="mailto:jack@newsreel.co">Contact</a>
  </div>
  <div class="footer-copy">&copy; 2026 Newsreel, Inc.</div>
</footer>

<script>
/* Delegated image fallback — avoids unsafe inline onerror */
document.addEventListener('error', function(e) {
  const el = e.target;
  if (el.tagName !== 'IMG' || el.dataset.fallbackApplied) return;
  el.dataset.fallbackApplied = 'true';
  const name = el.dataset.fallbackName || el.alt || 'User';
  el.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1c1c1f&color=a1a1aa&size=80';
}, true);

function safeHref(url) {
  if (!url || typeof url !== 'string') return '#';
  const t = url.trim();
  if (/^javascript:/i.test(t)) return '#';
  return t;
}

const BASE = location.pathname.includes('/perspectives') ? '/perspectives' : '';
const PAGES = { home: BASE || '/', search: BASE + '/search', voices: BASE + '/voices', methodology: BASE + '/methodology' };
document.getElementById('homeLink').href = PAGES.home;
document.getElementById('backLink').href = PAGES.home;
document.getElementById('methodLink').href = PAGES.methodology;
document.getElementById('voicesLink').href = PAGES.voices;

const COLORS = ['#60A5FA','#F87171','#FBBF24','#A78BFA','#4ADE80','#22D3EE','#F472B6','#FB923C'];
const PLATFORM = {x:'X',youtube:'YouTube',bluesky:'Bluesky',instagram:'Instagram',tiktok:'TikTok',substack:'Substack',podcast:'Podcast'};

/* Delegated share button — replaces inline onclick */
document.addEventListener('click', function(e) {
  if (e.target.closest('#shareBtn')) shareStory();
});

/* Delegated accordion handler — replaces inline onclick */
document.addEventListener('click', function(e) {
  const header = e.target.closest('[data-cluster-toggle]');
  if (!header) return;
  const card = header.parentElement;
  const isOpen = card.classList.toggle('open');
  header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const header = e.target.closest('[data-cluster-toggle]');
  if (!header) return;
  e.preventDefault();
  const card = header.parentElement;
  const isOpen = card.classList.toggle('open');
  header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

let _voiceMeta = {};
fetch(BASE + '/data/voices.json').then(r=>r.json()).then(voices => {
  for (const v of voices) _voiceMeta[v.id] = v;
}).catch(()=>{});
function getLens(id) { return (_voiceMeta[id]||{}).lens || ''; }

function esc(t) { const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
function slugify(t) { return t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').substring(0,60); }

function getSlugFromPath() {
  const m = location.pathname.match(/\/story\/(.+)/);
  return m ? decodeURIComponent(m[1]) : null;
}

async function loadStory() {
  const slug = getSlugFromPath();
  if (!slug) { showError('No story specified','The URL is missing a story slug.'); return; }

  try {
    const resp = await fetch(BASE + '/api/stories');
    if (!resp.ok) throw new Error('API returned ' + resp.status);
    const stories = await resp.json();
    let story = (stories||[]).find(s => slugify(s.headline) === slug);

    // Fallback: search
    if (!story) {
      const q = slug.replace(/-/g,' ');
      try {
        const lr = await fetch(BASE + '/api/lookup?q=' + encodeURIComponent(q));
        const ld = await lr.json();
        if (ld && ld.voices && ld.voices.length > 0) {
          const cg = {};
          for (const v of ld.voices) {
            const c = v.argumentCluster || 'Other';
            if (!cg[c]) cg[c] = [];
            cg[c].push({ voiceId:v.voiceId, voiceName:v.voiceName, photo:v.photo, platform:v.quotes[0]?.platform||'', quote:v.quotes[0]?.quote||'', sourceUrl:v.quotes[0]?.sourceUrl||'' });
          }
          story = { headline:ld.headline, summary:ld.broadeningNote||'', type:'spectrum', voiceCount:ld.voices.length,
            clusters:Object.entries(cg).map(([name,voices])=>({name,voices,voiceCount:voices.length})) };
        }
      } catch(e) {}
    }

    if (!story) {
      const searchUrl = PAGES.search + '?q=' + encodeURIComponent(slug.replace(/-/g,' '));
      showErrorWithSearch('Story not found', `"${slug.replace(/-/g,' ')}" may have rotated out.`, slug.replace(/-/g,' '), searchUrl);
      return;
    }

    renderStory(story);
  } catch(err) {
    showError('Failed to load','Something went wrong. Please try again.');
  }
}

function renderStory(story) {
  const clusters = story.clusters || [];
  const totalVoices = story.voiceCount || clusters.reduce((s,c) => s + (c.voiceCount||(c.voices||[]).length), 0);
  const allPlatforms = new Set();
  clusters.forEach(c => (c.voices||[]).forEach(v => { if(v.platform) allPlatforms.add(v.platform); }));

  document.title = `${story.headline} — Perspectives`;

  // Proportion bar
  const total = clusters.reduce((s,c) => s + (c.voiceCount||(c.voices||[]).length), 0) || 1;
  const barHtml = clusters.map((c,ci) => {
    const pct = ((c.voiceCount||(c.voices||[]).length) / total * 100).toFixed(1);
    return `<div class="proportion-segment" style="width:${pct}%;background:${COLORS[ci%COLORS.length]};"></div>`;
  }).join('');

  const legendHtml = clusters.map((c,ci) => {
    const count = c.voiceCount || (c.voices||[]).length;
    return `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[ci%COLORS.length]};"></div>${esc(c.name)} (${count})</div>`;
  }).join('');

  // Cluster cards
  let clustersHtml = '';
  clusters.forEach((cluster, ci) => {
    const color = COLORS[ci % COLORS.length];
    const voices = cluster.voices || [];
    const count = cluster.voiceCount || voices.length;
    const isFirst = ci === 0;

    // Deduplicate: track which voiceIds we've rendered
    const rendered = new Set();

    const voiceRows = voices.slice(0,12).map(v => {
      if (rendered.has(v.voiceId)) return '';
      rendered.add(v.voiceId);

      const photo = v.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(v.voiceName)}&background=1c1c1f&color=a1a1aa&size=80`;
      const lens = getLens(v.voiceId);
      const pLabel = PLATFORM[v.platform] || v.platform || '';
      const quote = (v.quote || '').substring(0, 280);

      return `<div class="voice-row">
        <img class="voice-row-photo" src="${photo}" alt="${esc(v.voiceName)}" data-fallback-name="${esc(v.voiceName)}">
        <div class="voice-row-body">
          <div>
            <a href="${BASE}/voice/${v.voiceId}" class="voice-row-name">${esc(v.voiceName)}</a>
            ${pLabel ? `<span class="voice-row-platform">${pLabel}</span>` : ''}
          </div>
          ${lens ? `<div class="voice-row-lens">${esc(lens)}</div>` : ''}
          ${quote ? `<div class="voice-row-quote">"${esc(quote)}"</div>` : ''}
          ${v.sourceUrl ? `<a class="voice-row-source" href="${safeHref(v.sourceUrl)}" target="_blank">View source &rarr;</a>` : ''}
        </div>
      </div>`;
    }).join('');

    const overflow = count - Math.min(voices.length, 12);

    clustersHtml += `<div class="cluster-card${isFirst ? ' open' : ''}" style="--cluster-color:${color};">
      <div class="cluster-header" role="button" tabindex="0" aria-expanded="${isFirst ? 'true' : 'false'}" data-cluster-toggle>
        <div class="cluster-name" style="color:${color};">${esc(cluster.name)}</div>
        <div class="cluster-count">${count} voices</div>
        <svg class="cluster-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="cluster-body">
        ${voiceRows}
        ${overflow > 0 ? `<div style="font-size:12px;color:var(--text-dim);padding:4px 12px;">+ ${overflow} more voices</div>` : ''}
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = `
    <div class="story-header">
      <div class="story-meta">${totalVoices} voices &middot; ${clusters.length} positions &middot; ${allPlatforms.size || 7} platforms</div>
      <h1 class="story-headline">${esc(story.headline)}</h1>
      ${story.summary ? `<p class="story-summary">${esc(story.summary)}</p>` : ''}
      <button class="share-btn" id="shareBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Share
      </button>
    </div>

    <div class="story-proportion">
      <div class="proportion-bar">${barHtml}</div>
      <div class="proportion-legend">${legendHtml}</div>
    </div>

    <div class="clusters">
      <div class="clusters-title">${clusters.length} argument positions</div>
      ${clustersHtml}
    </div>
  `;
}

function showError(title, msg) {
  document.getElementById('content').innerHTML = `<div class="error-state"><h2>${esc(title)}</h2><p>${esc(msg)}</p><a class="error-btn error-btn-secondary" href="${PAGES.home}">Back to stories</a></div>`;
}

function showErrorWithSearch(title, msg, query, searchUrl) {
  const div = document.createElement('div');
  div.className = 'error-state';
  div.innerHTML = `<h2>${esc(title)}</h2><p>${esc(msg)}</p>`;
  const a1 = document.createElement('a');
  a1.className = 'error-btn error-btn-primary';
  a1.href = searchUrl; // searchUrl is built from PAGES.search + encodeURIComponent, safe
  a1.textContent = `Search for "${query.substring(0,40)}"`;
  div.appendChild(a1);
  div.appendChild(document.createElement('br'));
  const a2 = document.createElement('a');
  a2.className = 'error-btn error-btn-secondary';
  a2.href = PAGES.home;
  a2.textContent = 'Back to stories';
  div.appendChild(a2);
  document.getElementById('content').innerHTML = '';
  document.getElementById('content').appendChild(div);
}

function shareStory() {
  navigator.clipboard.writeText(location.href).then(() => {
    const t = document.getElementById('shareToast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }).catch(() => prompt('Copy:', location.href));
}

loadStory();
</script>
</body>
</html>
