<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perspectives -- Story</title>
<meta name="description" content="See how 257 public voices react to this story, clustered by argument.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  /* ================================================================
     DESIGN TOKENS
     8px grid. Intentional gray ramp (Linear/Vercel style).
     Matches search.html token system exactly.
     ================================================================ */
  :root {
    /* Surface ramp -- each step is intentional */
    --bg-base: #09090b;
    --bg-subtle: #0f0f12;
    --bg-card: #141417;
    --bg-elevated: #1a1a1f;
    --bg-hover: #222228;
    --bg-active: #2a2a32;

    /* Text ramp */
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --text-dim: #52525b;

    /* Borders */
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --border-focus: rgba(255,99,67,0.5);

    /* Accent */
    --accent: #FF6343;
    --accent-hover: #e5553a;
    --accent-bg: rgba(255,99,67,0.10);
    --accent-bg-hover: rgba(255,99,67,0.16);

    /* Spacing (8px grid) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 32px;
    --space-8: 40px;
    --space-9: 48px;
    --space-10: 64px;

    /* Typography scale */
    --text-xs: 11px;
    --text-sm: 13px;
    --text-base: 15px;
    --text-lg: 17px;
    --text-xl: 20px;
    --text-2xl: 28px;
    --text-3xl: 36px;

    /* Line heights */
    --leading-tight: 1.2;
    --leading-snug: 1.35;
    --leading-normal: 1.5;
    --leading-relaxed: 1.6;

    /* Radius */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 100px;

    /* Transitions */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --duration-fast: 150ms;
    --duration-normal: 200ms;
    --duration-slow: 300ms;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* -- SKIP LINK -- */
  .skip-link {
    position: absolute; top: -100%; left: var(--space-4); z-index: 100;
    background: var(--accent); color: #fff;
    padding: var(--space-3) var(--space-6);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    font-weight: 600; font-size: var(--text-sm);
    text-decoration: none; transition: top var(--duration-normal);
  }
  .skip-link:focus { top: 0; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-base); color: var(--text-secondary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  :focus:not(:focus-visible) { outline: none; }

  /* -- NAV -- */
  .nav {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-5) var(--space-5) 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-brand {
    display: flex; align-items: baseline; gap: 0; text-decoration: none;
    transition: opacity var(--duration-fast);
  }
  .nav-brand:hover { opacity: 0.85; }
  .nav-brand:active { opacity: 0.7; }
  .nav-brand img { height: 22px; }
  .nav-brand-label {
    font-size: var(--text-xs); font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .nav-back {
    font-size: var(--text-sm); font-weight: 600; color: var(--text-muted);
    text-decoration: none; display: inline-flex; align-items: center; gap: var(--space-1);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-sm);
    transition: color var(--duration-fast), background var(--duration-fast);
  }
  .nav-back:hover { color: var(--text-primary); background: var(--bg-elevated); }
  .nav-back:active { background: var(--bg-hover); }

  /* -- STORY HEADER -- */
  .story-header {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-7) var(--space-5) 0;
  }
  .story-meta {
    font-size: var(--text-sm); color: var(--text-muted);
    margin-bottom: var(--space-3);
    display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap;
    text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
  }
  .story-headline {
    font-size: var(--text-2xl); font-weight: 700; color: var(--text-primary);
    line-height: var(--leading-tight); letter-spacing: -0.02em;
    margin-bottom: var(--space-3);
  }
  .story-summary {
    font-size: var(--text-base); color: var(--text-muted);
    line-height: var(--leading-relaxed);
    margin-bottom: var(--space-5); max-width: 600px;
  }

  /* -- SHARE -- */
  .share-btn {
    font-size: var(--text-sm); font-weight: 600; color: var(--text-muted);
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: var(--space-2) var(--space-4);
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: var(--space-2);
    transition: all var(--duration-normal) var(--ease-out);
  }
  .share-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .share-btn:active { transform: scale(0.97); }
  .share-toast {
    position: fixed; bottom: var(--space-6); left: 50%; transform: translateX(-50%);
    background: var(--bg-hover); color: var(--text-primary);
    border: 1px solid var(--border); padding: var(--space-3) var(--space-5);
    border-radius: var(--radius-md);
    font-size: var(--text-sm); font-weight: 600; z-index: 999;
    opacity: 0; pointer-events: none;
    transition: opacity var(--duration-normal);
  }
  .share-toast.visible { opacity: 1; }

  /* -- PROPORTION BAR -- */
  .story-proportion {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-6) var(--space-5) 0;
  }
  .proportion-bar {
    display: flex; height: var(--space-2); border-radius: var(--space-1);
    overflow: hidden; background: var(--bg-elevated);
  }
  .proportion-segment {
    height: 100%; cursor: pointer;
    transition: opacity var(--duration-fast), filter var(--duration-fast);
  }
  .proportion-segment:hover { opacity: 0.8; filter: brightness(1.15); }
  .proportion-legend {
    display: flex; flex-wrap: wrap; gap: var(--space-3);
    margin-top: var(--space-3);
  }
  .legend-item {
    display: inline-flex; align-items: center; gap: var(--space-2);
    font-size: var(--text-xs); color: var(--text-muted); font-weight: 500;
    cursor: pointer; padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-sm);
    border: none; background: none; font-family: inherit;
    transition: color var(--duration-fast);
  }
  .legend-item:hover { color: var(--text-primary); }
  .legend-dot {
    width: var(--space-2); height: var(--space-2);
    border-radius: 50%; flex-shrink: 0;
  }

  /* -- CLUSTER CARDS -- */
  .clusters {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-6) var(--space-5) var(--space-10);
  }
  .clusters-title {
    font-size: var(--text-sm); font-weight: 700; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: var(--space-5);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--border);
  }

  .cluster-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); margin-bottom: var(--space-3);
    overflow: hidden;
    border-left: 3px solid var(--cluster-color, #60A5FA);
    transition: border-color var(--duration-normal);
  }
  .cluster-card.highlight {
    border-color: var(--accent);
  }
  .cluster-header {
    padding: var(--space-4) var(--space-5);
    cursor: pointer; display: flex; align-items: center; gap: var(--space-3);
    transition: background var(--duration-fast);
    user-select: none;
  }
  .cluster-header:hover { background: var(--bg-elevated); }
  .cluster-header:active { background: var(--bg-hover); }
  .cluster-name {
    font-size: var(--text-base); font-weight: 600;
    flex: 1; line-height: var(--leading-snug);
  }
  .cluster-count {
    font-size: var(--text-xs); color: var(--text-muted); font-weight: 700;
    background: var(--bg-elevated); padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-full); white-space: nowrap;
  }
  .cluster-chevron {
    transition: transform var(--duration-normal) var(--ease-out);
    flex-shrink: 0; color: var(--text-dim);
  }
  .cluster-card.open .cluster-chevron { transform: rotate(180deg); }
  .cluster-body {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows var(--duration-slow) var(--ease-out);
  }
  .cluster-card.open .cluster-body { grid-template-rows: 1fr; }
  .cluster-body-inner {
    overflow: hidden;
    padding: 0 var(--space-5);
  }
  .cluster-card.open .cluster-body-inner {
    padding-bottom: var(--space-4);
  }

  /* -- VOICE ROW -- */
  .voice-row {
    display: flex; align-items: flex-start; gap: var(--space-3);
    padding: var(--space-3);
    background: var(--bg-elevated);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-2);
    transition: background var(--duration-fast);
  }
  .voice-row:last-child { margin-bottom: 0; }
  .voice-row:hover { background: var(--bg-hover); }
  .voice-row-photo {
    width: var(--space-8); height: var(--space-8);
    border-radius: 50%; object-fit: cover;
    background: var(--bg-hover); flex-shrink: 0;
  }
  .voice-row-body { flex: 1; min-width: 0; }
  .voice-row-header {
    display: flex; align-items: baseline; gap: var(--space-2);
    flex-wrap: wrap;
  }
  .voice-row-name {
    font-size: var(--text-sm); font-weight: 600;
    color: var(--text-primary); text-decoration: none;
    transition: color var(--duration-fast);
  }
  .voice-row-name:hover { color: var(--accent); }
  .voice-row-platform {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 700;
  }
  .voice-row-lens {
    font-size: var(--text-xs); color: var(--text-muted);
    margin-top: var(--space-1); line-height: var(--leading-snug);
  }
  .voice-row-quote {
    font-size: var(--text-sm); color: var(--text-secondary);
    line-height: var(--leading-normal);
    margin-top: var(--space-2); font-style: italic;
    padding-left: var(--space-3);
    border-left: 2px solid var(--bg-hover);
  }
  .voice-row-source {
    font-size: var(--text-xs); color: var(--accent);
    text-decoration: none; margin-top: var(--space-2);
    display: inline-flex; align-items: center; gap: var(--space-1);
    transition: opacity var(--duration-fast);
  }
  .voice-row-source:hover { text-decoration: underline; opacity: 0.85; }
  .cluster-overflow {
    font-size: var(--text-xs); color: var(--text-dim);
    padding: var(--space-1) var(--space-3);
    font-weight: 500;
  }

  /* -- SKELETON LOADING -- */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 37%, var(--bg-elevated) 63%);
    background-size: 800px 100%;
    animation: shimmer 1.8s ease-in-out infinite;
    border-radius: var(--radius-sm);
  }
  .skeleton-header {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-7) var(--space-5) 0;
  }
  .skeleton-line { height: 14px; margin-bottom: var(--space-3); }
  .skeleton-line.h-lg { height: 24px; }
  .skeleton-line.h-xl { height: 32px; }
  .skeleton-line.w-full { width: 100%; }
  .skeleton-line.w-3-4 { width: 75%; }
  .skeleton-line.w-1-2 { width: 50%; }
  .skeleton-line.w-1-3 { width: 33%; }
  .skeleton-line.w-1-4 { width: 25%; }
  .skeleton-bar {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-6) var(--space-5) 0;
  }
  .skeleton-bar-inner {
    height: var(--space-2); border-radius: var(--space-1); width: 100%;
  }
  .skeleton-clusters {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-6) var(--space-5);
  }
  .skeleton-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5);
    margin-bottom: var(--space-3);
  }

  /* -- ERROR / EMPTY STATES -- */
  .state-message {
    text-align: center;
    padding: var(--space-10) var(--space-5);
    max-width: 400px; margin: 0 auto;
  }
  .state-message-icon {
    margin-bottom: var(--space-4);
    color: var(--text-dim); line-height: 1;
  }
  .state-message-title {
    font-size: var(--text-lg); font-weight: 600;
    color: var(--text-primary); margin-bottom: var(--space-2);
  }
  .state-message-body {
    font-size: var(--text-sm); color: var(--text-muted);
    line-height: var(--leading-relaxed); margin-bottom: var(--space-5);
  }
  .state-message-actions {
    display: flex; flex-direction: column; align-items: center; gap: var(--space-2);
  }
  .state-action {
    display: inline-flex; align-items: center; gap: var(--space-2);
    padding: var(--space-3) var(--space-5);
    font-size: var(--text-sm); font-weight: 600;
    border-radius: var(--radius-md); text-decoration: none;
    font-family: inherit; cursor: pointer;
    transition: all var(--duration-normal) var(--ease-out);
  }
  .state-action-primary {
    background: var(--accent); color: #fff; border: none;
  }
  .state-action-primary:hover { background: var(--accent-hover); }
  .state-action-primary:active { transform: scale(0.97); }
  .state-action-secondary {
    background: var(--bg-card); color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .state-action-secondary:hover {
    border-color: var(--border-hover); color: var(--text-primary);
    background: var(--bg-elevated);
  }
  .state-action-secondary:active { transform: scale(0.97); }

  /* -- FOOTER -- */
  .site-footer {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-8) var(--space-5) var(--space-7);
    border-top: 1px solid var(--border); text-align: center;
  }
  .footer-brand {
    font-size: var(--text-sm); font-weight: 700;
    color: var(--text-primary); margin-bottom: var(--space-2);
  }
  .footer-brand span { color: var(--accent); }
  .footer-links {
    display: flex; justify-content: center; gap: var(--space-5);
    flex-wrap: wrap; margin-bottom: var(--space-3);
  }
  .footer-links a {
    font-size: var(--text-sm); color: var(--text-muted);
    text-decoration: none;
    transition: color var(--duration-fast);
  }
  .footer-links a:hover { color: var(--text-primary); }
  .footer-copy { font-size: var(--text-xs); color: var(--text-dim); }

  /* -- MOBILE -- */
  @media (max-width: 600px) {
    .nav { padding: var(--space-4) var(--space-4) 0; }
    .nav-brand img { height: 18px; }
    .story-header { padding: var(--space-6) var(--space-4) 0; }
    .story-headline { font-size: var(--text-xl); }
    .story-proportion { padding: var(--space-4) var(--space-4) 0; }
    .clusters { padding: var(--space-4) var(--space-4) var(--space-8); }
    .cluster-header { padding: var(--space-3) var(--space-4); }
    .cluster-body-inner { padding: 0 var(--space-4); }
    .cluster-card.open .cluster-body-inner { padding-bottom: var(--space-3); }
    .voice-row { padding: var(--space-3); gap: var(--space-3); }
    .voice-row-photo { width: 36px; height: 36px; }
    .proportion-legend { gap: var(--space-2); }
    .legend-item { font-size: 10px; padding: var(--space-1); }
    .skeleton-header { padding: var(--space-6) var(--space-4) 0; }
    .skeleton-bar { padding: var(--space-4) var(--space-4) 0; }
    .skeleton-clusters { padding: var(--space-4) var(--space-4); }
    .site-footer { padding: var(--space-7) var(--space-4) var(--space-6); }
  }
</style>
</head>

<script>
/* ================================================================
   Perspectives Story Detail -- IIFE to avoid global pollution
   All state and functions scoped inside.
   ================================================================ */
;(function() {
  'use strict';

  /* -- ROUTING -- */
  var BASE = location.pathname.includes('/perspectives') ? '/perspectives' : '';
  var PAGES = {
    home: BASE || '/',
    search: BASE + '/search',
    voices: BASE + '/voices',
    methodology: BASE + '/methodology'
  };

  document.getElementById('homeLink').href = PAGES.home;
  document.getElementById('backLink').href = PAGES.home;
  document.getElementById('methodLink').href = PAGES.methodology;
  document.getElementById('voicesLink').href = PAGES.voices;

  /* -- CONSTANTS -- */
  var COLORS = ['#60A5FA','#F87171','#FBBF24','#A78BFA','#4ADE80','#22D3EE','#F472B6','#FB923C'];
  var PLATFORM = { x:'X', youtube:'YouTube', bluesky:'Bluesky', instagram:'Instagram', tiktok:'TikTok', substack:'Substack', podcast:'Podcast' };

  /* -- DOM REFS -- */
  var skeletonEl = document.getElementById('skeleton');
  var contentEl = document.getElementById('content');
  var shareToast = document.getElementById('shareToast');

  /* -- UTILITIES -- */
  function esc(t) {
    var d = document.createElement('div');
    d.textContent = t || '';
    return d.innerHTML;
  }

  function slugify(t) {
    return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 60);
  }

  function safeHref(url) {
    if (!url || typeof url !== 'string') return '#';
    var trimmed = url.trim();
    if (/^javascript:/i.test(trimmed)) return '#';
    return trimmed;
  }

  /* -- STATE MESSAGE BUILDER -- */
  function stateMessage(iconSvg, title, body, actions) {
    var wrap = document.createElement('div');
    wrap.className = 'state-message';
    wrap.setAttribute('role', 'status');

    var html = '';
    if (iconSvg) html += '<div class="state-message-icon">' + iconSvg + '</div>';
    if (title) html += '<div class="state-message-title">' + esc(title) + '</div>';
    if (body) html += '<div class="state-message-body">' + esc(body) + '</div>';
    wrap.innerHTML = html;

    if (actions && actions.length > 0) {
      var actionsWrap = document.createElement('div');
      actionsWrap.className = 'state-message-actions';
      actions.forEach(function(action) {
        var el = document.createElement('a');
        el.className = 'state-action ' + (action.primary ? 'state-action-primary' : 'state-action-secondary');
        el.href = action.href || '#';
        el.textContent = action.text;
        if (action.href === '#' && action.onClick) {
          el.addEventListener('click', function(e) { e.preventDefault(); action.onClick(); });
        }
        actionsWrap.appendChild(el);
      });
      wrap.appendChild(actionsWrap);
    }
    return wrap;
  }

  /* -- DELEGATED IMAGE FALLBACK -- */
  document.addEventListener('error', function(e) {
    var el = e.target;
    if (el.tagName !== 'IMG' || el.dataset.fallbackApplied) return;
    el.dataset.fallbackApplied = 'true';
    var name = el.dataset.fallbackName || el.alt || 'User';
    el.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1a1a1f&color=a1a1aa&size=80';
  }, true);

  /* -- DELEGATED SHARE BUTTON -- */
  document.addEventListener('click', function(e) {
    if (e.target.closest('#shareBtn')) {
      e.preventDefault();
      shareStory();
    }
  });

  /* -- DELEGATED ACCORDION (click + keyboard) -- */
  document.addEventListener('click', function(e) {
    var header = e.target.closest('[data-cluster-toggle]');
    if (!header) return;
    toggleCluster(header);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    var header = e.target.closest('[data-cluster-toggle]');
    if (!header) return;
    e.preventDefault();
    toggleCluster(header);
  });

  function toggleCluster(header) {
    var card = header.parentElement;
    var isOpen = card.classList.toggle('open');
    header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    var bodyId = header.getAttribute('aria-controls');
    if (bodyId) {
      var body = document.getElementById(bodyId);
      if (body) body.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
    }
  }

  /* -- SCROLL-TO-CLUSTER (proportion bar + legend) -- */
  document.addEventListener('click', function(e) {
    var el = e.target.closest('[data-scroll-cluster]');
    if (!el) return;
    var idx = el.dataset.scrollCluster;
    var card = document.getElementById('cluster-' + idx);
    if (!card) return;
    if (!card.classList.contains('open')) {
      card.classList.add('open');
      var header = card.querySelector('[data-cluster-toggle]');
      if (header) header.setAttribute('aria-expanded', 'true');
      var bodyId = header ? header.getAttribute('aria-controls') : null;
      if (bodyId) {
        var body = document.getElementById(bodyId);
        if (body) body.setAttribute('aria-hidden', 'false');
      }
    }
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    card.classList.add('highlight');
    setTimeout(function() { card.classList.remove('highlight'); }, 2000);
  });

  /* -- VOICE METADATA -- */
  var _voiceMeta = {};
  fetch(BASE + '/data/voices.json')
    .then(function(r) {
      if (!r.ok) throw new Error('Voice data unavailable');
      return r.json();
    })
    .then(function(voices) {
      for (var i = 0; i < voices.length; i++) {
        _voiceMeta[voices[i].id] = voices[i];
      }
    })
    .catch(function(err) {
      console.warn('[Perspectives] Could not load voices.json:', err.message);
    });

  function getLens(id) {
    return (_voiceMeta[id] || {}).lens || '';
  }

  /* -- SLUG PARSING -- */
  function getSlugFromPath() {
    var m = location.pathname.match(/\/story\/(.+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }

  /* -- LOAD STORY -- */
  function loadStory() {
    var slug = getSlugFromPath();
    if (!slug) {
      showError('No story specified', 'The URL is missing a story slug.');
      return;
    }

    fetch(BASE + '/api/stories')
      .then(function(resp) {
        if (!resp.ok) throw new Error('API returned ' + resp.status);
        return resp.json();
      })
      .then(function(stories) {
        var story = (stories || []).find(function(s) { return slugify(s.headline) === slug; });

        if (story) return story;

        // Fallback: search via lookup API
        var q = slug.replace(/-/g, ' ');
        return fetch(BASE + '/api/lookup?q=' + encodeURIComponent(q))
          .then(function(lr) { return lr.json(); })
          .then(function(ld) {
            if (ld && ld.voices && ld.voices.length > 0) {
              var cg = {};
              for (var i = 0; i < ld.voices.length; i++) {
                var v = ld.voices[i];
                var c = v.argumentCluster || 'Other';
                if (!cg[c]) cg[c] = [];
                cg[c].push({
                  voiceId: v.voiceId,
                  voiceName: v.voiceName,
                  photo: v.photo,
                  platform: v.quotes[0] ? v.quotes[0].platform : '',
                  quote: v.quotes[0] ? v.quotes[0].quote : '',
                  sourceUrl: v.quotes[0] ? v.quotes[0].sourceUrl : ''
                });
              }
              return {
                headline: ld.headline,
                summary: ld.broadeningNote || '',
                type: 'spectrum',
                voiceCount: ld.voices.length,
                clusters: Object.entries(cg).map(function(pair) {
                  return { name: pair[0], voices: pair[1], voiceCount: pair[1].length };
                })
              };
            }
            return null;
          })
          .catch(function() { return null; });
      })
      .then(function(story) {
        if (!story) {
          var searchUrl = PAGES.search + '?q=' + encodeURIComponent(slug.replace(/-/g, ' '));
          showErrorWithSearch(
            'Story not found',
            '"' + slug.replace(/-/g, ' ') + '" may have rotated out.',
            slug.replace(/-/g, ' '),
            searchUrl
          );
          return;
        }
        renderStory(story);
      })
      .catch(function(err) {
        console.error('[Perspectives] Story load failed:', err);
        showError('Failed to load', 'Something went wrong. Please try again.');
      });
  }

  /* -- RENDER STORY -- */
  function renderStory(story) {
    var clusters = story.clusters || [];
    var totalVoices = story.voiceCount || clusters.reduce(function(s, c) {
      return s + (c.voiceCount || (c.voices || []).length);
    }, 0);
    var allPlatforms = new Set();
    clusters.forEach(function(c) {
      (c.voices || []).forEach(function(v) {
        if (v.platform) allPlatforms.add(v.platform);
      });
    });

    document.title = story.headline + ' -- Perspectives';

    // Proportion bar segments
    var total = clusters.reduce(function(s, c) {
      return s + (c.voiceCount || (c.voices || []).length);
    }, 0) || 1;

    var barSegments = clusters.map(function(c, ci) {
      var pct = ((c.voiceCount || (c.voices || []).length) / total * 100).toFixed(1);
      var color = COLORS[ci % COLORS.length];
      return '<div class="proportion-segment" style="width:' + pct + '%;background:' + color + ';" ' +
        'data-scroll-cluster="' + ci + '" ' +
        'role="button" tabindex="0" ' +
        'aria-label="' + esc(c.name) + ' -- ' + pct + '% of voices" ' +
        'title="' + esc(c.name) + ' (' + pct + '%)"></div>';
    }).join('');

    var legendItems = clusters.map(function(c, ci) {
      var count = c.voiceCount || (c.voices || []).length;
      var color = COLORS[ci % COLORS.length];
      return '<button class="legend-item" type="button" data-scroll-cluster="' + ci + '" aria-label="Jump to ' + esc(c.name) + '">' +
        '<span class="legend-dot" style="background:' + color + ';" aria-hidden="true"></span>' +
        esc(c.name) + ' (' + count + ')' +
      '</button>';
    }).join('');

    // Cluster cards
    var clustersHtml = '';
    clusters.forEach(function(cluster, ci) {
      var color = COLORS[ci % COLORS.length];
      var voices = cluster.voices || [];
      var count = cluster.voiceCount || voices.length;
      var isFirst = ci === 0;
      var bodyId = 'cluster-body-' + ci;

      // Deduplicate
      var rendered = {};
      var voiceRows = voices.slice(0, 12).map(function(v) {
        if (rendered[v.voiceId]) return '';
        rendered[v.voiceId] = true;

        var photo = v.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(v.voiceName) + '&background=1a1a1f&color=a1a1aa&size=80';
        var lens = getLens(v.voiceId);
        var pLabel = PLATFORM[v.platform] || v.platform || '';
        var quote = (v.quote || '').substring(0, 280);

        return '<article class="voice-row">' +
          '<img class="voice-row-photo" src="' + photo + '" alt="" data-fallback-name="' + esc(v.voiceName) + '" loading="lazy">' +
          '<div class="voice-row-body">' +
            '<div class="voice-row-header">' +
              '<a href="' + BASE + '/voice/' + v.voiceId + '" class="voice-row-name">' + esc(v.voiceName) + '</a>' +
              (pLabel ? '<span class="voice-row-platform">' + esc(pLabel) + '</span>' : '') +
            '</div>' +
            (lens ? '<div class="voice-row-lens">' + esc(lens) + '</div>' : '') +
            (quote ? '<blockquote class="voice-row-quote">"' + esc(quote) + '"</blockquote>' : '') +
            (v.sourceUrl ? '<a class="voice-row-source" href="' + safeHref(v.sourceUrl) + '" target="_blank" rel="noopener">View source <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></a>' : '') +
          '</div>' +
        '</article>';
      }).join('');

      var overflow = count - Math.min(voices.length, 12);

      clustersHtml += '<section class="cluster-card' + (isFirst ? ' open' : '') + '" style="--cluster-color:' + color + ';" id="cluster-' + ci + '" aria-labelledby="cluster-heading-' + ci + '">' +
        '<div class="cluster-header" role="button" tabindex="0" ' +
          'aria-expanded="' + (isFirst ? 'true' : 'false') + '" ' +
          'aria-controls="' + bodyId + '" ' +
          'data-cluster-toggle ' +
          'id="cluster-heading-' + ci + '">' +
          '<div class="cluster-name" style="color:' + color + ';">' + esc(cluster.name) + '</div>' +
          '<div class="cluster-count">' + count + ' voice' + (count !== 1 ? 's' : '') + '</div>' +
          '<svg class="cluster-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>' +
        '</div>' +
        '<div class="cluster-body" id="' + bodyId + '" role="region" aria-hidden="' + (isFirst ? 'false' : 'true') + '">' +
          '<div class="cluster-body-inner">' +
            voiceRows +
            (overflow > 0 ? '<div class="cluster-overflow">+ ' + overflow + ' more voice' + (overflow !== 1 ? 's' : '') + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</section>';
    });

    // Hide skeleton, show content
    skeletonEl.style.display = 'none';
    contentEl.style.display = 'block';

    contentEl.innerHTML =
      '<header class="story-header">' +
        '<div class="story-meta">' + totalVoices + ' voices &middot; ' + clusters.length + ' positions &middot; ' + (allPlatforms.size || 7) + ' platforms</div>' +
        '<h1 class="story-headline">' + esc(story.headline) + '</h1>' +
        (story.summary ? '<p class="story-summary">' + esc(story.summary) + '</p>' : '') +
        '<button class="share-btn" id="shareBtn" type="button" aria-label="Copy link to clipboard">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>' +
          'Share' +
        '</button>' +
      '</header>' +
      '<nav class="story-proportion" aria-label="Argument distribution">' +
        '<div class="proportion-bar" role="group" aria-label="Proportion of voices per argument position">' + barSegments + '</div>' +
        '<div class="proportion-legend" role="group" aria-label="Argument position legend">' + legendItems + '</div>' +
      '</nav>' +
      '<div class="clusters" role="list" aria-label="Argument clusters">' +
        '<div class="clusters-title">' + clusters.length + ' argument position' + (clusters.length !== 1 ? 's' : '') + '</div>' +
        clustersHtml +
      '</div>';
  }

  /* -- ERROR STATES -- */
  function showError(title, msg) {
    skeletonEl.style.display = 'none';
    contentEl.style.display = 'block';
    contentEl.innerHTML = '';
    contentEl.appendChild(
      stateMessage(
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>',
        title,
        msg,
        [{ text: 'Back to stories', href: PAGES.home, primary: false }]
      )
    );
  }

  function showErrorWithSearch(title, msg, query, searchUrl) {
    skeletonEl.style.display = 'none';
    contentEl.style.display = 'block';
    contentEl.innerHTML = '';
    contentEl.appendChild(
      stateMessage(
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>',
        title,
        msg,
        [
          { text: 'Search for "' + query.substring(0, 40) + '"', href: searchUrl, primary: true },
          { text: 'Back to stories', href: PAGES.home, primary: false }
        ]
      )
    );
  }

  /* -- SHARE -- */
  function shareStory() {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(location.href).then(function() {
        showToast();
      }).catch(function() {
        prompt('Copy this link:', location.href);
      });
    } else {
      prompt('Copy this link:', location.href);
    }
  }

  function showToast() {
    shareToast.classList.add('visible');
    setTimeout(function() {
      shareToast.classList.remove('visible');
    }, 2000);
  }

  /* -- INIT -- */
  loadStory();

})();
</script>
</body>
</html>
