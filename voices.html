<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perspectives -- All Voices</title>
<meta name="description" content="Browse all voices tracked by Perspectives. 257+ commentators, creators, and journalists across the political spectrum.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  /* ================================================================
     DESIGN TOKENS
     8px grid. Intentional gray ramp (Linear/Vercel style).
     Matches search.html / story.html token system exactly.
     ================================================================ */
  :root {
    /* Surface ramp -- each step is intentional */
    --bg-base: #09090b;
    --bg-subtle: #0f0f12;
    --bg-card: #141417;
    --bg-elevated: #1a1a1f;
    --bg-hover: #222228;
    --bg-active: #2a2a32;

    /* Text ramp */
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --text-dim: #52525b;

    /* Borders */
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --border-focus: rgba(255,99,67,0.5);

    /* Accent */
    --accent: #FF6343;
    --accent-hover: #e5553a;
    --accent-bg: rgba(255,99,67,0.10);
    --accent-bg-hover: rgba(255,99,67,0.16);

    /* Spacing (8px grid) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 32px;
    --space-8: 40px;
    --space-9: 48px;
    --space-10: 64px;

    /* Typography scale */
    --text-xs: 11px;
    --text-sm: 13px;
    --text-base: 15px;
    --text-lg: 17px;
    --text-xl: 20px;
    --text-2xl: 28px;
    --text-3xl: 36px;

    /* Line heights */
    --leading-tight: 1.2;
    --leading-snug: 1.35;
    --leading-normal: 1.5;
    --leading-relaxed: 1.6;

    /* Radius */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 100px;

    /* Transitions */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --duration-fast: 150ms;
    --duration-normal: 200ms;
    --duration-slow: 300ms;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* -- SKIP LINK -- */
  .skip-link {
    position: absolute; top: -100%; left: var(--space-4); z-index: 100;
    background: var(--accent); color: #fff;
    padding: var(--space-3) var(--space-6);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    font-weight: 600; font-size: var(--text-sm);
    text-decoration: none; transition: top var(--duration-normal);
  }
  .skip-link:focus { top: 0; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-base); color: var(--text-secondary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  :focus:not(:focus-visible) { outline: none; }

  /* -- NAV -- */
  .nav {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-5) var(--space-5) 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-brand {
    display: flex; align-items: baseline; gap: 0; text-decoration: none;
    transition: opacity var(--duration-fast);
  }
  .nav-brand:hover { opacity: 0.85; }
  .nav-brand:active { opacity: 0.7; }
  .nav-brand img { height: 22px; }
  .nav-brand-label {
    font-size: var(--text-xs); font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .nav-back {
    font-size: var(--text-sm); font-weight: 600; color: var(--text-muted);
    text-decoration: none; display: inline-flex; align-items: center; gap: var(--space-1);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-sm);
    transition: color var(--duration-fast), background var(--duration-fast);
  }
  .nav-back:hover { color: var(--text-primary); background: var(--bg-elevated); }
  .nav-back:active { background: var(--bg-hover); }

  /* -- PAGE HEADER -- */
  .page-header {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-7) var(--space-5) 0;
  }
  .page-headline {
    font-size: var(--text-2xl); font-weight: 700; color: var(--text-primary);
    line-height: var(--leading-tight); letter-spacing: -0.02em;
    margin-bottom: var(--space-3);
  }
  .page-description {
    font-size: var(--text-base); color: var(--text-muted);
    line-height: var(--leading-relaxed);
    max-width: 600px; margin-bottom: var(--space-4);
  }

  /* -- METHODOLOGY DISCLOSURE -- */
  .methodology-toggle {
    display: inline-flex; align-items: center; gap: var(--space-2);
    font-size: var(--text-sm); font-weight: 600; color: var(--accent);
    background: none; border: none; cursor: pointer;
    padding: var(--space-2) 0; font-family: inherit;
    transition: opacity var(--duration-fast);
  }
  .methodology-toggle:hover { opacity: 0.8; }
  .methodology-toggle-chevron {
    transition: transform var(--duration-normal) var(--ease-out);
    flex-shrink: 0;
  }
  .methodology-toggle[aria-expanded="true"] .methodology-toggle-chevron {
    transform: rotate(180deg);
  }
  .methodology-body {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows var(--duration-slow) var(--ease-out);
  }
  .methodology-body.open { grid-template-rows: 1fr; }
  .methodology-body-inner { overflow: hidden; }
  .methodology-content {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-5); margin-top: var(--space-3);
  }
  .methodology-content p {
    font-size: var(--text-sm); color: var(--text-muted);
    line-height: var(--leading-relaxed);
    margin-bottom: var(--space-4);
  }
  .methodology-content p:last-child { margin-bottom: 0; }
  .methodology-content strong {
    color: var(--text-secondary); font-weight: 600;
  }

  /* -- SEARCH BAR -- */
  .search-section {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-5) var(--space-5) 0;
  }
  .search-row {
    display: flex; gap: var(--space-3);
  }
  .search-input {
    flex: 1; padding: var(--space-3) var(--space-4);
    background: var(--bg-card); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: var(--radius-md);
    font-family: inherit; font-size: var(--text-sm);
    transition: border-color var(--duration-fast);
  }
  .search-input:focus { border-color: var(--border-focus); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-clear {
    padding: var(--space-3) var(--space-5);
    background: var(--bg-card); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: var(--radius-md);
    font-family: inherit; font-size: var(--text-sm); font-weight: 600;
    cursor: pointer;
    transition: all var(--duration-normal) var(--ease-out);
  }
  .search-clear:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--bg-elevated); }
  .search-clear:active { transform: scale(0.97); }

  /* -- FILTER CHIPS -- */
  .filter-section {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-4) var(--space-5) 0;
  }
  .filter-row {
    display: flex; flex-wrap: wrap; gap: var(--space-2);
  }
  .filter-label {
    font-size: var(--text-xs); font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: var(--space-2) 0;
    margin-right: var(--space-2);
    align-self: center;
  }
  .filter-chip {
    font-size: var(--text-xs); font-weight: 600;
    padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-full);
    background: var(--bg-card); color: var(--text-muted);
    border: 1px solid var(--border);
    cursor: pointer; font-family: inherit;
    transition: all var(--duration-fast);
  }
  .filter-chip:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .filter-chip.active {
    background: var(--accent-bg); color: var(--accent);
    border-color: var(--accent);
  }

  /* -- STATS BANNER -- */
  .stats-section {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-4) var(--space-5) 0;
  }
  .stats-row {
    display: flex; flex-wrap: wrap; gap: var(--space-5);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    font-size: var(--text-xs); color: var(--text-muted); font-weight: 500;
  }
  .stat-value {
    color: var(--accent); font-weight: 700;
  }

  /* -- VOICE GRID -- */
  .voices-section {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-5) var(--space-5) var(--space-10);
  }
  .voice-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-3);
  }

  /* -- VOICE TILE -- */
  .voice-tile {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-5);
    text-decoration: none; display: block;
    transition: all var(--duration-normal) var(--ease-out);
  }
  .voice-tile:hover {
    border-color: var(--border-hover);
    background: var(--bg-elevated);
  }
  .voice-tile:active { background: var(--bg-hover); }

  .tile-header {
    display: flex; gap: var(--space-3); align-items: center;
  }
  .tile-photo {
    width: var(--space-9); height: var(--space-9);
    border-radius: 50%; object-fit: cover;
    background: var(--bg-hover); flex-shrink: 0;
    filter: grayscale(100%);
    transition: filter var(--duration-slow) var(--ease-out);
  }
  .voice-tile:hover .tile-photo { filter: grayscale(0%); }
  .tile-info { flex: 1; min-width: 0; }
  .tile-name {
    font-size: var(--text-base); font-weight: 600;
    color: var(--text-primary); line-height: var(--leading-snug);
  }
  .tile-platform {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 700; margin-top: var(--space-1);
  }
  .tile-lens {
    font-size: var(--text-xs); color: var(--text-muted);
    line-height: var(--leading-snug);
    margin-top: var(--space-2);
  }
  .tile-tags {
    display: flex; flex-wrap: wrap; gap: var(--space-1);
    margin-top: var(--space-3);
  }
  .tile-tag {
    font-size: 10px; font-weight: 600;
    padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-sm);
    background: var(--accent-bg); color: var(--accent);
  }
  .tile-socials {
    display: flex; gap: var(--space-2); margin-top: var(--space-3);
  }
  .tile-social-link {
    font-size: 10px; font-weight: 600; color: var(--text-dim);
    text-decoration: none;
    padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-sm);
    background: var(--bg-elevated); border: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.04em;
    transition: all var(--duration-fast);
  }
  .tile-social-link:hover { color: var(--accent); border-color: var(--accent); }
  .tile-stat {
    font-size: var(--text-xs); color: var(--text-dim); font-weight: 500;
    margin-top: var(--space-3);
  }
  .tile-arrow {
    flex-shrink: 0; color: var(--text-dim);
    transition: color var(--duration-fast), transform var(--duration-fast);
  }
  .voice-tile:hover .tile-arrow {
    color: var(--accent); transform: translateX(2px);
  }

  /* -- SKELETON LOADING -- */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 37%, var(--bg-elevated) 63%);
    background-size: 800px 100%;
    animation: shimmer 1.8s ease-in-out infinite;
    border-radius: var(--radius-sm);
  }
  .skeleton-header {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-7) var(--space-5) 0;
  }
  .skeleton-line { height: 14px; margin-bottom: var(--space-3); }
  .skeleton-line.h-lg { height: 24px; }
  .skeleton-line.h-xl { height: 32px; }
  .skeleton-line.w-full { width: 100%; }
  .skeleton-line.w-3-4 { width: 75%; }
  .skeleton-line.w-1-2 { width: 50%; }
  .skeleton-line.w-1-3 { width: 33%; }
  .skeleton-line.w-1-4 { width: 25%; }
  .skeleton-search {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-5) var(--space-5) 0;
  }
  .skeleton-search-bar {
    height: 42px; border-radius: var(--radius-md); width: 100%;
  }
  .skeleton-stats {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-4) var(--space-5) 0;
  }
  .skeleton-stats-inner {
    display: flex; gap: var(--space-5);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--border);
  }
  .skeleton-grid {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-5) var(--space-5);
  }
  .skeleton-tile {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-5);
    margin-bottom: var(--space-3);
    display: flex; gap: var(--space-3); align-items: center;
  }
  .skeleton-avatar {
    width: var(--space-9); height: var(--space-9);
    border-radius: 50%; flex-shrink: 0;
  }
  .skeleton-tile-lines { flex: 1; }

  /* -- ERROR / EMPTY STATES -- */
  .state-message {
    text-align: center;
    padding: var(--space-10) var(--space-5);
    max-width: 400px; margin: 0 auto;
  }
  .state-message-icon {
    margin-bottom: var(--space-4);
    color: var(--text-dim); line-height: 1;
  }
  .state-message-title {
    font-size: var(--text-lg); font-weight: 600;
    color: var(--text-primary); margin-bottom: var(--space-2);
  }
  .state-message-body {
    font-size: var(--text-sm); color: var(--text-muted);
    line-height: var(--leading-relaxed); margin-bottom: var(--space-5);
  }

  /* -- FOOTER -- */
  .site-footer {
    max-width: 680px; margin: 0 auto;
    padding: var(--space-8) var(--space-5) var(--space-7);
    border-top: 1px solid var(--border); text-align: center;
  }
  .footer-brand {
    font-size: var(--text-sm); font-weight: 700;
    color: var(--text-primary); margin-bottom: var(--space-2);
  }
  .footer-brand span { color: var(--accent); }
  .footer-links {
    display: flex; justify-content: center; gap: var(--space-5);
    flex-wrap: wrap; margin-bottom: var(--space-3);
  }
  .footer-links a {
    font-size: var(--text-sm); color: var(--text-muted);
    text-decoration: none;
    transition: color var(--duration-fast);
  }
  .footer-links a:hover { color: var(--text-primary); }
  .footer-copy { font-size: var(--text-xs); color: var(--text-dim); }

  /* -- MOBILE -- */
  @media (max-width: 600px) {
    .nav { padding: var(--space-4) var(--space-4) 0; }
    .nav-brand img { height: 18px; }
    .page-header { padding: var(--space-6) var(--space-4) 0; }
    .page-headline { font-size: var(--text-xl); }
    .search-section { padding: var(--space-4) var(--space-4) 0; }
    .filter-section { padding: var(--space-3) var(--space-4) 0; }
    .stats-section { padding: var(--space-3) var(--space-4) 0; }
    .voices-section { padding: var(--space-4) var(--space-4) var(--space-8); }
    .voice-tile { padding: var(--space-3) var(--space-4); }
    .tile-photo { width: 40px; height: 40px; }
    .tile-name { font-size: var(--text-sm); }
    .skeleton-header { padding: var(--space-6) var(--space-4) 0; }
    .skeleton-search { padding: var(--space-4) var(--space-4) 0; }
    .skeleton-stats { padding: var(--space-3) var(--space-4) 0; }
    .skeleton-grid { padding: var(--space-4) var(--space-4); }
    .site-footer { padding: var(--space-7) var(--space-4) var(--space-6); }
  }
</style>
</head>

<script>
/* ================================================================
   Perspectives Voice Directory -- IIFE to avoid global pollution
   All state and functions scoped inside.
   ================================================================ */
;(function() {
  'use strict';

  /* -- ROUTING -- */
  var BASE = location.pathname.includes('/perspectives') ? '/perspectives' : '';
  var PAGES = {
    home: BASE || '/',
    search: BASE + '/search',
    voices: BASE + '/voices',
    methodology: BASE + '/methodology'
  };

  document.getElementById('homeLink').href = PAGES.home;
  document.getElementById('backLink').href = PAGES.home;
  document.getElementById('methodLink').href = PAGES.methodology;
  document.getElementById('voicesLink').href = PAGES.voices;

  /* -- PLATFORM LABELS -- */
  var PLATFORM = {
    x: 'X', youtube: 'YouTube', bluesky: 'Bluesky',
    instagram: 'Instagram', tiktok: 'TikTok',
    substack: 'Substack', podcast: 'Podcast'
  };

  /* -- DOM REFS -- */
  var skeletonEl = document.getElementById('skeleton');
  var contentEl = document.getElementById('content');

  /* -- STATE -- */
  var _voices = {};
  var _voicePosts = {};
  var _currentFilter = '';
  var _activeCategory = '';
  var _activePlatform = '';

  /* -- UTILITIES -- */
  function esc(t) {
    var d = document.createElement('div');
    d.textContent = t || '';
    return d.innerHTML;
  }

  function safeHref(url) {
    if (!url || typeof url !== 'string') return '#';
    var trimmed = url.trim();
    if (/^javascript:/i.test(trimmed)) return '#';
    return trimmed;
  }

  /* -- DELEGATED IMAGE FALLBACK -- */
  document.addEventListener('error', function(e) {
    var el = e.target;
    if (el.tagName !== 'IMG' || el.dataset.fallbackApplied) return;
    el.dataset.fallbackApplied = 'true';
    var name = el.dataset.fallbackName || el.alt || 'User';
    el.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1a1a1f&color=a1a1aa&size=96';
  }, true);

  /* -- DELEGATED CLICK HANDLERS -- */
  document.addEventListener('click', function(e) {
    // Voice tile navigation
    var tile = e.target.closest('[data-voice-href]');
    if (tile) {
      // Don't navigate if clicking a social link inside the tile
      if (e.target.closest('.tile-social-link')) return;
      e.preventDefault();
      location.href = tile.dataset.voiceHref;
      return;
    }

    // Clear search
    if (e.target.closest('[data-action="clear-search"]')) {
      e.preventDefault();
      var input = document.getElementById('searchInput');
      if (input) {
        input.value = '';
        _currentFilter = '';
        renderGrid();
      }
      return;
    }

    // Category filter chip
    var catChip = e.target.closest('[data-filter-category]');
    if (catChip) {
      e.preventDefault();
      var cat = catChip.dataset.filterCategory;
      _activeCategory = (_activeCategory === cat) ? '' : cat;
      updateFilterChips();
      renderGrid();
      return;
    }

    // Platform filter chip
    var platChip = e.target.closest('[data-filter-platform]');
    if (platChip) {
      e.preventDefault();
      var plat = platChip.dataset.filterPlatform;
      _activePlatform = (_activePlatform === plat) ? '' : plat;
      updateFilterChips();
      renderGrid();
      return;
    }

    // Methodology toggle
    var methToggle = e.target.closest('[data-action="toggle-methodology"]');
    if (methToggle) {
      e.preventDefault();
      var isOpen = methToggle.getAttribute('aria-expanded') === 'true';
      methToggle.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
      var body = document.getElementById('methodologyBody');
      if (body) {
        body.classList.toggle('open');
        body.setAttribute('aria-hidden', isOpen ? 'true' : 'false');
      }
      return;
    }
  });

  /* -- DELEGATED SEARCH INPUT -- */
  document.addEventListener('input', function(e) {
    if (e.target.id === 'searchInput') {
      _currentFilter = e.target.value;
      renderGrid();
    }
  });

  /* -- UPDATE FILTER CHIP STATES -- */
  function updateFilterChips() {
    var chips = document.querySelectorAll('[data-filter-category]');
    for (var i = 0; i < chips.length; i++) {
      if (chips[i].dataset.filterCategory === _activeCategory) {
        chips[i].classList.add('active');
      } else {
        chips[i].classList.remove('active');
      }
    }
    var platChips = document.querySelectorAll('[data-filter-platform]');
    for (var j = 0; j < platChips.length; j++) {
      if (platChips[j].dataset.filterPlatform === _activePlatform) {
        platChips[j].classList.add('active');
      } else {
        platChips[j].classList.remove('active');
      }
    }
  }

  /* -- SOCIAL LINKS BUILDER -- */
  function buildSocialLinks(voice) {
    var h = voice.handles || {};
    var links = [];
    if (h.x) links.push('<a class="tile-social-link" href="https://x.com/' + esc(h.x) + '" target="_blank" rel="noopener" aria-label="' + esc(voice.name) + ' on X">X</a>');
    if (h.youtube) {
      var ytPath = (h.youtube.indexOf('/') !== -1) ? h.youtube : '@' + h.youtube;
      links.push('<a class="tile-social-link" href="https://youtube.com/' + esc(ytPath) + '" target="_blank" rel="noopener" aria-label="' + esc(voice.name) + ' on YouTube">YT</a>');
    }
    if (h.bluesky) links.push('<a class="tile-social-link" href="https://bsky.app/profile/' + esc(h.bluesky) + '" target="_blank" rel="noopener" aria-label="' + esc(voice.name) + ' on Bluesky">BS</a>');
    if (h.tiktok) links.push('<a class="tile-social-link" href="https://tiktok.com/@' + esc(h.tiktok) + '" target="_blank" rel="noopener" aria-label="' + esc(voice.name) + ' on TikTok">TT</a>');
    if (h.instagram) links.push('<a class="tile-social-link" href="https://instagram.com/' + esc(h.instagram) + '" target="_blank" rel="noopener" aria-label="' + esc(voice.name) + ' on Instagram">IG</a>');
    return links.length ? '<div class="tile-socials">' + links.join('') + '</div>' : '';
  }

  /* -- COUNT PLATFORMS FOR A VOICE -- */
  function countPlatforms(voice) {
    var h = voice.handles || {};
    var count = 0;
    var keys = Object.keys(h);
    for (var i = 0; i < keys.length; i++) {
      if (h[keys[i]]) count++;
    }
    return count;
  }

  /* -- GET ALL UNIQUE CATEGORIES FROM VOICES -- */
  function getCategories() {
    var cats = {};
    var ids = Object.keys(_voices);
    for (var i = 0; i < ids.length; i++) {
      var v = _voices[ids[i]];
      var tags = v.tags || [];
      for (var j = 0; j < tags.length; j++) {
        cats[tags[j]] = (cats[tags[j]] || 0) + 1;
      }
    }
    // Sort by count descending
    var sorted = Object.keys(cats).sort(function(a, b) { return cats[b] - cats[a]; });
    return sorted.slice(0, 12);
  }

  /* -- GET ALL UNIQUE PLATFORMS FROM VOICES -- */
  function getPlatforms() {
    var plats = {};
    var ids = Object.keys(_voices);
    for (var i = 0; i < ids.length; i++) {
      var h = _voices[ids[i]].handles || {};
      var keys = Object.keys(h);
      for (var j = 0; j < keys.length; j++) {
        if (h[keys[j]]) {
          plats[keys[j]] = (plats[keys[j]] || 0) + 1;
        }
      }
    }
    return Object.keys(plats).sort(function(a, b) { return plats[b] - plats[a]; });
  }

  /* -- RENDER GRID -- */
  function renderGrid() {
    var gridEl = document.getElementById('voiceGrid');
    var countEl = document.getElementById('shownCount');
    if (!gridEl) return;

    var filterLower = (_currentFilter || '').toLowerCase();
    var voices = Object.values(_voices);

    // Sort: voices with post data first, then by follower count
    voices.sort(function(a, b) {
      var aHas = _voicePosts[a.id] ? 1 : 0;
      var bHas = _voicePosts[b.id] ? 1 : 0;
      if (aHas !== bHas) return bHas - aHas;
      return (b.followers || 0) - (a.followers || 0);
    });

    var html = '';
    var shown = 0;

    for (var i = 0; i < voices.length; i++) {
      var voice = voices[i];
      var data = _voicePosts[voice.id];
      var topics = data ? Object.keys(data.topicSummary || {}) : [];
      var postCount = data ? (data.posts || []).length : 0;

      // Text filter
      if (filterLower) {
        var matchName = voice.name.toLowerCase().indexOf(filterLower) !== -1;
        var matchLens = (voice.lens || '').toLowerCase().indexOf(filterLower) !== -1;
        var matchTopic = false;
        for (var t = 0; t < topics.length; t++) {
          if (topics[t].indexOf(filterLower) !== -1) { matchTopic = true; break; }
        }
        var matchTag = false;
        var voiceTags = voice.tags || [];
        for (var g = 0; g < voiceTags.length; g++) {
          if (voiceTags[g].toLowerCase().indexOf(filterLower) !== -1) { matchTag = true; break; }
        }
        if (!matchName && !matchLens && !matchTopic && !matchTag) continue;
      }

      // Category filter
      if (_activeCategory) {
        var hasCat = false;
        var cTags = voice.tags || [];
        for (var c = 0; c < cTags.length; c++) {
          if (cTags[c] === _activeCategory) { hasCat = true; break; }
        }
        if (!hasCat) continue;
      }

      // Platform filter
      if (_activePlatform) {
        var h = voice.handles || {};
        if (!h[_activePlatform]) continue;
      }

      shown++;

      var photo = voice.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(voice.name) + '&background=1a1a1f&color=a1a1aa&size=96';
      var platformCount = countPlatforms(voice);
      var platformLabel = platformCount + ' platform' + (platformCount !== 1 ? 's' : '');

      html += '<a class="voice-tile" href="' + BASE + '/voice/' + esc(voice.id) + '" data-voice-href="' + BASE + '/voice/' + esc(voice.id) + '" aria-label="View ' + esc(voice.name) + ' profile">' +
        '<div class="tile-header">' +
          '<img class="tile-photo" src="' + photo + '" alt="" data-fallback-name="' + esc(voice.name) + '" loading="lazy">' +
          '<div class="tile-info">' +
            '<div class="tile-name">' + esc(voice.name) + '</div>' +
            '<div class="tile-platform">' + esc(platformLabel) + '</div>' +
          '</div>' +
          '<svg class="tile-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>' +
        '</div>' +
        (voice.lens ? '<div class="tile-lens">' + esc(voice.lens) + '</div>' : '');

      // Tags
      var tags = voice.tags || [];
      if (tags.length > 0) {
        html += '<div class="tile-tags">';
        for (var ti = 0; ti < tags.length && ti < 4; ti++) {
          html += '<span class="tile-tag">' + esc(tags[ti]) + '</span>';
        }
        if (tags.length > 4) {
          html += '<span class="tile-tag">+' + (tags.length - 4) + '</span>';
        }
        html += '</div>';
      }

      // Social links
      html += buildSocialLinks(voice);

      // Post stat
      if (postCount > 0) {
        html += '<div class="tile-stat">' + postCount + ' recent post' + (postCount !== 1 ? 's' : '') + ' collected</div>';
      }

      html += '</a>';
    }

    if (shown === 0) {
      html = '<div class="state-message" role="status">' +
        '<div class="state-message-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>' +
        '<div class="state-message-title">No voices match</div>' +
        '<div class="state-message-body">Try a different search term or clear your filters.</div>' +
      '</div>';
    }

    gridEl.innerHTML = html;
    if (countEl) countEl.textContent = shown + ' shown';
  }

  /* -- RENDER FULL PAGE -- */
  function renderPage(stats) {
    skeletonEl.style.display = 'none';
    contentEl.style.display = 'block';

    var categories = getCategories();
    var platforms = getPlatforms();

    var catChips = '';
    for (var i = 0; i < categories.length; i++) {
      catChips += '<button class="filter-chip" type="button" data-filter-category="' + esc(categories[i]) + '">' + esc(categories[i]) + '</button>';
    }

    var platChips = '';
    for (var j = 0; j < platforms.length; j++) {
      var label = PLATFORM[platforms[j]] || platforms[j];
      platChips += '<button class="filter-chip" type="button" data-filter-platform="' + esc(platforms[j]) + '">' + esc(label) + '</button>';
    }

    contentEl.innerHTML =
      '<header class="page-header">' +
        '<h1 class="page-headline">The voices we track</h1>' +
        '<p class="page-description">Commentators, creators, and journalists across the political spectrum. Inclusion is not endorsement. The goal is to show you how the same story looks through different lenses.</p>' +
        '<button class="methodology-toggle" type="button" data-action="toggle-methodology" aria-expanded="false" aria-controls="methodologyBody">' +
          'How it works' +
          '<svg class="methodology-toggle-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>' +
        '</button>' +
        '<div class="methodology-body" id="methodologyBody" aria-hidden="true">' +
          '<div class="methodology-body-inner">' +
            '<div class="methodology-content">' +
              '<p><strong>Daily collection.</strong> Every day, we pull recent posts from each voice across 5 platforms: X, YouTube, Bluesky, TikTok, and Instagram. No content is altered or editorialized.</p>' +
              '<p><strong>Topic categorization.</strong> AI reads each post and tags it with a news topic. This lets us match voices to stories when you search.</p>' +
              '<p><strong>Argument clusters, not left/right.</strong> When you search a story, we don\'t slap a "left" or "right" label on each voice. Instead, AI analyzes what each person is actually saying and groups them into 4-6 argument clusters. This reveals the real fractures: two people on the same political "side" often take very different positions on the same story.</p>' +
              '<p><strong>Why this matters.</strong> Most media tools sort voices into a left/right binary. But that flattens reality. Tucker Carlson and Ben Shapiro are both conservative, but on Iran, one is anti-war and the other is pro-intervention. That difference is the insight.</p>' +
              '<p><strong>Criteria.</strong> 500K+ followers on at least one platform, regularly comments on current events, represents a distinct perspective not already covered.</p>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</header>' +

      '<section class="search-section" aria-label="Search voices">' +
        '<div class="search-row">' +
          '<input class="search-input" type="text" id="searchInput" placeholder="Search voices, topics, or tags..." aria-label="Search voices">' +
          '<button class="search-clear" type="button" data-action="clear-search">Clear</button>' +
        '</div>' +
      '</section>' +

      (catChips || platChips ?
        '<section class="filter-section" aria-label="Filter voices">' +
          (platChips ? '<div class="filter-row"><span class="filter-label">Platform</span>' + platChips + '</div>' : '') +
          (catChips ? '<div class="filter-row" style="margin-top:var(--space-2);"><span class="filter-label">Category</span>' + catChips + '</div>' : '') +
        '</section>' : '') +

      '<section class="stats-section" aria-label="Voice statistics">' +
        '<div class="stats-row">' +
          '<span class="stat-item"><span class="stat-value">' + stats.voiceCount + '</span> voices tracked</span>' +
          '<span class="stat-item"><span class="stat-value">' + stats.collectedCount + '</span> collected today</span>' +
          '<span class="stat-item"><span class="stat-value">' + stats.postCount + '</span> posts</span>' +
          '<span class="stat-item"><span class="stat-value">' + stats.topicCount + '</span> topics</span>' +
          '<span class="stat-item" id="shownCount"></span>' +
        '</div>' +
      '</section>' +

      '<section class="voices-section" aria-label="Voice directory">' +
        '<div class="voice-grid" id="voiceGrid" role="list"></div>' +
      '</section>';

    renderGrid();
  }

  /* -- SHOW ERROR -- */
  function showError(title, msg) {
    skeletonEl.style.display = 'none';
    contentEl.style.display = 'block';
    contentEl.innerHTML =
      '<div class="state-message" role="status">' +
        '<div class="state-message-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg></div>' +
        '<div class="state-message-title">' + esc(title) + '</div>' +
        '<div class="state-message-body">' + esc(msg) + '</div>' +
      '</div>';
  }

  /* -- INIT -- */
  function init() {
    var voicesLoaded = fetch(BASE + '/data/voices.json')
      .then(function(r) {
        if (!r.ok) throw new Error('Voice data unavailable');
        return r.json();
      })
      .then(function(voices) {
        for (var i = 0; i < voices.length; i++) {
          _voices[voices[i].id] = voices[i];
        }
      });

    var totalPosts = 0;
    var totalTopics = {};
    var voicesWithData = {};

    var topicsLoaded = fetch(BASE + '/api/topics')
      .then(function(r) {
        if (!r.ok) throw new Error('Topics unavailable');
        return r.json();
      })
      .then(function(topicIndex) {
        var topicKeys = Object.keys(topicIndex);
        for (var t = 0; t < topicKeys.length; t++) {
          var topic = topicKeys[t];
          totalTopics[topic] = true;
          var entries = topicIndex[topic];
          for (var e = 0; e < entries.length; e++) {
            var entry = entries[e];
            totalPosts++;
            voicesWithData[entry.voiceId] = true;
            if (!_voicePosts[entry.voiceId]) {
              _voicePosts[entry.voiceId] = { posts: [], topicSummary: {} };
            }
            if (!_voicePosts[entry.voiceId].topicSummary[topic]) {
              _voicePosts[entry.voiceId].topicSummary[topic] = [];
            }
            _voicePosts[entry.voiceId].topicSummary[topic].push({
              quote: entry.quote,
              sourceUrl: entry.sourceUrl,
              platform: entry.platform
            });
            _voicePosts[entry.voiceId].posts.push(entry);
          }
        }
      })
      .catch(function(err) {
        console.warn('[Perspectives] Could not load topic index:', err.message);
      });

    Promise.all([voicesLoaded, topicsLoaded])
      .then(function() {
        renderPage({
          voiceCount: Object.keys(_voices).length,
          collectedCount: Object.keys(voicesWithData).length,
          postCount: totalPosts,
          topicCount: Object.keys(totalTopics).length
        });
      })
      .catch(function(err) {
        console.error('[Perspectives] Init failed:', err);
        showError('Failed to load voices', 'Something went wrong loading voice data. Please try again.');
      });
  }

  init();

})();
</script>
</body>
</html>
