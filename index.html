<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perspectives — Newsreel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000; --lead: #111; --iron: #222; --steel: #444;
    --ash: #808080; --silver: #b0b0b0; --smoke: #d0d0d0; --white: #fff;
    --red: #FF6343; --blue: #4A9EFF; --yellow: #EDBD1F; --green: #1AAD17;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }

  .container { max-width:720px; margin:0 auto; padding:0 20px; }

  /* Header */
  .header { padding:28px 0 20px; border-bottom:1px solid var(--iron); }
  .header-top { display:flex; align-items:center; justify-content:space-between; }
  .header-logo { font-family:'Bree Serif',serif; font-size:22px; color:var(--white); text-decoration:none; }
  .header-label { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:var(--red); text-transform:uppercase; letter-spacing:2px; }
  .header-date { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ash); margin-top:6px; text-transform:uppercase; letter-spacing:1px; }
  .header-sub { font-size:14px; color:var(--silver); margin-top:10px; line-height:1.5; }

  /* Nav */
  .nav { display:flex; gap:6px; margin-top:14px; }
  .nav a {
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ash);
    text-decoration:none; padding:5px 12px; border:1px solid var(--iron);
    border-radius:6px; transition:all 0.15s;
  }
  .nav a:hover { color:var(--white); border-color:var(--steel); }

  /* Story cards */
  .stories { margin:24px 0 48px; display:flex; flex-direction:column; gap:16px; }

  .story-card {
    background:var(--lead); border:1px solid var(--iron); border-radius:14px;
    overflow:hidden; transition:border-color 0.2s;
  }
  .story-card:hover { border-color:#333; }

  .story-top { padding:22px 24px 18px; cursor:pointer; }
  .story-type {
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ash);
    text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px;
  }
  .story-headline {
    font-family:'Bree Serif',serif; font-size:20px; line-height:1.3;
    color:var(--white); margin-bottom:8px;
  }
  .story-summary { font-size:14px; color:var(--silver); line-height:1.5; margin-bottom:14px; }

  /* Heat + meta row */
  .story-meta-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .heat-pill {
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
    padding:4px 10px; border-radius:12px; letter-spacing:0.5px;
  }
  .heat-hot { background:rgba(239,68,68,0.15); color:#ef4444; }
  .heat-warm { background:rgba(251,191,36,0.15); color:#fbbf24; }
  .heat-cool { background:rgba(74,158,255,0.12); color:#4A9EFF; }
  .meta-stat {
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ash);
  }
  .meta-stat strong { color:var(--smoke); }

  /* Counter-narrative */
  .counter-bar {
    margin:0 24px 16px; padding:10px 14px;
    background:rgba(255,99,67,0.06); border-left:3px solid var(--red);
    border-radius:0 8px 8px 0; font-size:13px; color:var(--silver); line-height:1.4;
  }

  /* Cluster pills row */
  .cluster-row { display:flex; gap:8px; flex-wrap:wrap; padding:0 24px 18px; }
  .cluster-pill {
    padding:5px 12px; border-radius:14px;
    font-family:'IBM Plex Mono',monospace; font-size:11px;
    color:var(--silver); border:1px solid var(--iron);
    cursor:pointer; transition:all 0.15s; white-space:nowrap;
  }
  .cluster-pill:hover { border-color:var(--steel); color:var(--white); }
  .cluster-pill.active { background:var(--red); border-color:var(--red); color:var(--white); font-weight:600; }
  .cluster-count { opacity:0.6; margin-left:4px; }

  /* Expanded story detail */
  .story-detail { display:none; padding:0 24px 24px; border-top:1px solid var(--iron); }
  .story-card.expanded .story-detail { display:block; }

  /* Voice list (not bubbles) */
  .voice-list { display:flex; flex-direction:column; gap:10px; margin-top:16px; }

  .voice-row {
    display:flex; gap:14px; padding:14px 16px;
    background:rgba(255,255,255,0.03); border-radius:10px;
    border:1px solid transparent; transition:all 0.15s;
  }
  .voice-row:hover { background:rgba(255,255,255,0.05); border-color:var(--iron); }

  .voice-photo {
    width:52px; height:52px; border-radius:50%; flex-shrink:0;
    object-fit:cover; background:var(--iron);
  }
  .voice-body { flex:1; min-width:0; }
  .voice-name-row { display:flex; align-items:center; gap:8px; margin-bottom:2px; }
  .voice-name { font-size:15px; font-weight:600; }
  .voice-platform {
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ash);
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .voice-quote {
    font-size:14px; color:var(--silver); line-height:1.5;
    margin-top:6px; padding-left:12px; border-left:2px solid var(--iron);
  }
  .voice-link {
    display:inline-block; margin-top:8px;
    font-family:'IBM Plex Mono',monospace; font-size:11px;
    color:var(--red); text-decoration:none;
  }
  .voice-link:hover { text-decoration:underline; }
  .voice-cluster-tag {
    display:inline-block; margin-top:8px; margin-left:12px;
    padding:2px 8px; border-radius:10px;
    font-family:'IBM Plex Mono',monospace; font-size:10px;
  }

  /* Best quote callout */
  .best-quote {
    padding:16px 18px; margin:16px 0 8px;
    background:rgba(255,99,67,0.05); border-radius:10px;
    border:1px solid rgba(255,99,67,0.15);
  }
  .best-quote-text { font-size:15px; color:var(--smoke); line-height:1.5; font-style:italic; }
  .best-quote-attr { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ash); margin-top:6px; }

  /* Expand chevron */
  .expand-arrow {
    font-size:18px; color:var(--ash); transition:transform 0.2s;
    margin-left:auto; padding-left:12px;
  }
  .story-card.expanded .expand-arrow { transform:rotate(180deg); }

  /* Search story link */
  .search-story-link {
    display:inline-block; margin-top:18px;
    font-family:'IBM Plex Mono',monospace; font-size:12px;
    color:var(--red); text-decoration:none;
    padding:8px 16px; border:1px solid rgba(255,99,67,0.3);
    border-radius:8px; transition:all 0.15s;
  }
  .search-story-link:hover { background:rgba(255,99,67,0.1); border-color:var(--red); }

  /* Loading / empty */
  .loading { text-align:center; padding:60px; color:var(--ash); }
  .spinner { width:24px; height:24px; border:2px solid var(--iron); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Footer */
  .footer { padding:32px 0; border-top:1px solid var(--iron); text-align:center; }
  .footer-brand { font-family:'Bree Serif',serif; font-size:16px; margin-bottom:6px; }
  .footer-text { font-size:12px; color:var(--ash); }
  .footer-text a { color:var(--silver); text-decoration:underline; }

  @media (max-width:640px) {
    .story-headline { font-size:18px; }
    .story-top { padding:18px 18px 14px; }
    .cluster-row, .story-detail, .counter-bar { margin-left:18px; margin-right:18px; padding-left:0; padding-right:0; }
    .counter-bar { margin-left:18px; margin-right:18px; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-top">
      <a href="/" class="header-logo">newsreel</a>
      <span class="header-label">Perspectives</span>
    </div>
    <div class="header-date" id="header-date"></div>
    <div class="header-sub">How the internet's biggest voices reacted to today's stories.</div>
    <nav class="nav">
      <a href="/search">Search</a>
      <a href="/voices">Voices</a>
      <a href="/review">Review</a>
    </nav>
  </header>

  <div class="stories" id="stories">
    <div class="loading"><div class="spinner"></div>Loading stories...</div>
  </div>

  <footer class="footer">
    <div class="footer-brand">newsreel</div>
    <div class="footer-text">Clarity over clicks. <a href="https://newsreel.co">Open the app</a></div>
  </footer>
</div>

<script>
const CLUSTER_COLORS = ['#FF6343','#4A9EFF','#EDBD1F','#1AAD17','#E066FF','#FF8C42','#00CED1','#FF69B4'];

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

async function loadStories() {
  const el = document.getElementById('stories');

  // Set date
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('header-date').textContent = formatDate(today);

  try {
    const resp = await fetch('/api/stories');
    const stories = await resp.json();

    if (!stories || stories.length === 0) {
      el.innerHTML = '<div class="loading" style="color:var(--ash)">No stories yet today. The pipeline runs at 6am ET.</div>';
      return;
    }

    el.innerHTML = stories.map((story, si) => {
      const heat = story.heatScore || 0;
      const heatClass = heat >= 70 ? 'heat-hot' : heat >= 40 ? 'heat-warm' : 'heat-cool';
      const heatLabel = heat >= 70 ? 'Hot' : heat >= 40 ? 'Warm' : 'Cool';
      const clusters = story.clusters || [];
      const cn = story.counterNarrative;

      // Build cluster pills
      const clusterPills = clusters.map((c, ci) =>
        `<span class="cluster-pill" data-ci="${ci}" data-si="${si}" onclick="event.stopPropagation(); filterCluster(${si}, ${ci}, this)" style="border-left:3px solid ${CLUSTER_COLORS[ci % CLUSTER_COLORS.length]}">${esc(c.name)} <span class="cluster-count">${c.voiceCount}</span></span>`
      ).join('');

      // Build voice list
      const voiceRows = [];
      clusters.forEach((cluster, ci) => {
        const color = CLUSTER_COLORS[ci % CLUSTER_COLORS.length];
        (cluster.voices || []).forEach(v => {
          voiceRows.push(`
            <div class="voice-row" data-cluster="${ci}">
              <img class="voice-photo" src="${esc(v.photo || '')}" alt="${esc(v.voiceName)}" onerror="this.style.background='var(--iron)'">
              <div class="voice-body">
                <div class="voice-name-row">
                  <span class="voice-name">${esc(v.voiceName)}</span>
                  <span class="voice-platform">${esc(v.platform || '')}</span>
                </div>
                <div class="voice-quote">${esc((v.quote || '').substring(0, 280))}${(v.quote || '').length > 280 ? '...' : ''}</div>
                ${v.sourceUrl ? `<a class="voice-link" href="${esc(v.sourceUrl)}" target="_blank" rel="noopener">View source &rarr;</a>` : ''}
                <span class="voice-cluster-tag" style="background:${color}15;color:${color};border:1px solid ${color}33">${esc(cluster.name)}</span>
              </div>
            </div>
          `);
        });
      });

      // Best quote from first cluster
      let bestQuoteHtml = '';
      for (const cluster of clusters) {
        if (cluster.bestQuote) {
          bestQuoteHtml = `
            <div class="best-quote">
              <div class="best-quote-text">"${esc(cluster.bestQuote.quote.substring(0, 300))}"</div>
              <div class="best-quote-attr">- ${esc(cluster.bestQuote.voiceName)} on ${esc(cluster.bestQuote.platform)}</div>
            </div>
          `;
          break;
        }
      }

      return `
        <div class="story-card" id="story-${si}">
          <div class="story-top" onclick="toggleStory(${si})">
            <div class="story-type">${esc(story.type || 'story')}</div>
            <div class="story-headline">${esc(story.headline)}</div>
            <div class="story-summary">${esc(story.summary || '')}</div>
            <div class="story-meta-row">
              <span class="heat-pill ${heatClass}">${heatLabel} ${heat}/100</span>
              <span class="meta-stat"><strong>${story.voiceCount || 0}</strong> voices</span>
              <span class="meta-stat"><strong>${clusters.length}</strong> clusters</span>
              <span class="meta-stat">Confidence <strong>${story.confidence || '?'}/10</strong></span>
              <span class="expand-arrow">&#9660;</span>
            </div>
          </div>
          ${cn ? `<div class="counter-bar">${esc(cn.tension)}</div>` : ''}
          <div class="cluster-row">${clusterPills}</div>
          <div class="story-detail">
            ${bestQuoteHtml}
            <div class="voice-list" id="voices-${si}">${voiceRows.join('')}</div>
            <a href="/search?q=${encodeURIComponent(story.headline)}" class="search-story-link">Search this story &rarr;</a>
          </div>
        </div>
      `;
    }).join('');

  } catch(e) {
    el.innerHTML = `<div class="loading" style="color:var(--ash)">Failed to load stories: ${e.message}</div>`;
  }
}

function toggleStory(si) {
  const card = document.getElementById('story-' + si);
  card.classList.toggle('expanded');
}

function filterCluster(si, ci, el) {
  const card = document.getElementById('story-' + si);
  if (!card.classList.contains('expanded')) card.classList.add('expanded');

  // Toggle active state
  const wasActive = el.classList.contains('active');
  card.querySelectorAll('.cluster-pill').forEach(p => p.classList.remove('active'));

  const voiceRows = card.querySelectorAll('.voice-row');
  if (wasActive) {
    // Show all
    voiceRows.forEach(r => r.style.display = '');
  } else {
    el.classList.add('active');
    voiceRows.forEach(r => {
      r.style.display = r.dataset.cluster === String(ci) ? '' : 'none';
    });
  }
}

loadStories();
</script>
</body>
</html>
